<script>
        // PASTIKAN URL API INI SESUAI DENGAN WEB APP URL GOOGLE APPS SCRIPT ANDA
        const API_URL = "https://script.google.com/macros/s/AKfycbwSecDGlRvoUIIFto3fVziMH9gaQFu3VnPaNSYtGXkz9DfMBcmx3S_idYgNMaL8NF8U/exec"; 

        let cloudSiswa = [];
        let cloudAbsen = [];
        let configJam = { jamMasuk: "07:30", jamPulang: "14:00" };
        let html5QrcodeScanner = null;

        document.addEventListener("DOMContentLoaded", () => {
            // Set default input filter tanggal ke tanggal lokal hari ini (Format: YYYY-MM-DD)
            const kini = new Date();
            const lokalTgl = kini.getFullYear() + '-' + String(kini.getMonth() + 1).padStart(2, '0') + '-' + String(kini.getDate()).padStart(2, '0');
            
            document.getElementById('fRekapTgl').value = lokalTgl;
            
            document.getElementById('fRekapTgl').addEventListener('change', () => {
                renderTableAbsen();
                updateDashboardStats();
            });
            document.getElementById('fRekapKelas').addEventListener('input', renderTableAbsen);

            syncDataFromCloud();
        });

        function showLoading(status) {
            const loader = document.getElementById('loadingStatus');
            if (loader) {
                if (status) loader.classList.remove('hidden');
                else loader.classList.add('hidden');
            }
        }

        function syncDataFromCloud() {
            showLoading(true);
            fetch(`${API_URL}?action=getAllData`)
                .then(res => res.json())
                .then(data => {
                    cloudSiswa = data.siswa || [];
                    cloudAbsen = data.absensi || [];
                    if (data.settings) {
                        configJam = data.settings;
                        document.getElementById('cMasuk').value = configJam.jamMasuk;
                        document.getElementById('cPulang').value = configJam.jamPulang;
                    }
                    
                    renderTableSiswa();
                    renderTableAbsen();
                    updateDashboardStats();
                })
                .catch(err => console.error("Sinkronisasi Cloud Gagal:", err))
                .finally(() => showLoading(false));
        }

        // PERBAIKAN: Fungsi hitung statistik dashboard agar membaca variasi object key & format tanggal
        function updateDashboardStats() {
            const tglHariIni = document.getElementById('fRekapTgl').value; // Format: YYYY-MM-DD

            const absenHariIni = cloudAbsen.filter(a => {
                const tglRaw = a.tanggal || a.TANGGAL || '';
                if (!tglRaw) return false;
                // Ambil 10 karakter pertama (YYYY-MM-DD) baik dari format ISO maupun teks biasa
                const tglClean = tglRaw.includes('T') ? tglRaw.split('T')[0] : tglRaw.substring(0, 10);
                return tglClean === tglHariIni;
            });

            const totalSiswa = cloudSiswa.length;
            
            // Hitung status kehadiran (Mendukung Huruf Kapital / Kecil dari Sheets)
            const hadir = absenHariIni.filter(a => {
                const st = (a.status || a.STATUS || '').toLowerCase();
                return st === 'hadir' || st === 'terlambat';
            }).length;

            const nonHadir = absenHariIni.filter(a => {
                const st = (a.status || a.STATUS || '').toLowerCase();
                return ['sakit', 'izin', 'alpa'].includes(st);
            }).length;

            const pulang = absenHariIni.filter(a => {
                const plg = a.pulang || a.PULANG || '-';
                return plg !== '-' && plg !== '';
            }).length;

            document.getElementById('statSiswa').innerText = totalSiswa;
            document.getElementById('statHadir').innerText = hadir;
            document.getElementById('statAbsen').innerText = nonHadir;
            document.getElementById('statPulang').innerText = pulang;
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + viewId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('text-white', 'bg-bActive');
                b.classList.add('text-bMuted');
            });
            document.getElementById('nav-' + viewId).classList.add('text-white', 'bg-bActive');
            
            const titles = { dashboard: 'Dashboard Absensi', scan: 'Pemindai Kamera QR', rekap: 'Laporan Rekapitulasi', siswa: 'Master Data Siswa', manual: 'Kelola Absen Manual', 'jam-config': 'Atur Waktu Absensi' };
            document.getElementById('pageTitle').innerText = titles[viewId] || 'Sistem Absensi';

            if (viewId === 'scan') startQRScanner();
            else stopQRScanner();
        }

        function openModal() { document.getElementById('inputModal').classList.remove('hidden'); }
        function closeModal() { 
            document.getElementById('inputModal').classList.add('hidden'); 
            document.getElementById('dynamicForm').reset();
        }

        function openUploadModal() { document.getElementById('uploadModal').classList.remove('hidden'); }
        function closeUploadModal() { 
            document.getElementById('uploadModal').classList.add('hidden'); 
            document.getElementById('csvFile').value = '';
        }

        function openCardModal(nisn, nama, kelas) {
            document.getElementById('qrcode-space').innerHTML = '';
            document.getElementById('card-nama').innerText = nama;
            document.getElementById('card-kelas').innerText = "KELAS: " + kelas;
            document.getElementById('card-nisn').innerText = "NISN. " + nisn;
            
            new QRCode(document.getElementById("qrcode-space"), {
                text: nisn.toString(),
                width: 120,
                height: 120,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
            
            document.getElementById('cardModal').classList.remove('hidden');
        }

        function closeCardModal() { document.getElementById('cardModal').classList.add('hidden'); }

        function handleTambahSiswa(e) {
            e.preventDefault();
            showLoading(true);

            const n = document.getElementById('fNisn').value.trim();
            const nm = document.getElementById('fNama').value.trim();
            const kl = document.getElementById('fKelas').value.trim();
            const wa = document.getElementById('fWa').value.trim();

            const payload = { action: "tambahSiswa", nisn: n, nama: nm, kelas: kl, whatsapp: wa };

            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                alert(res.message);
                if(res.success) {
                    closeModal();
                    syncDataFromCloud();
                    setTimeout(() => { openCardModal(n, nm, kl); }, 800);
                }
            })
            .catch(err => alert("Gagal koneksi ke server script."))
            .finally(() => showLoading(false));
        }

        function renderTableSiswa() {
            const tbody = document.getElementById('tableSiswaBody');
            tbody.innerHTML = '';
            
            if(cloudSiswa.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-bMuted">Belum ada data siswa dari Google Sheets.</td></tr>`;
                return;
            }

            cloudSiswa.forEach(s => {
                const cleanNisn = (s.nisn || s.NISN || s.nisn_siswa || '-').toString();
                const cleanNama = (s.nama || s.NAMA || s.nama_lengkap || '-').replace(/'/g, "\\'");
                const cleanKelas = (s.kelas || s.KELAS || '-').replace(/'/g, "\\'");
                const cleanWa = s.whatsapp || s.WHATSAPP || s.whatsapp_ortu || '-';

                tbody.innerHTML += `
                    <tr class="hover:bg-white/5 transition-colors border-b border-white/5">
                        <td class="p-4 font-mono font-bold text-white">${cleanNisn}</td>
                        <td class="p-4">${cleanNama}</td>
                        <td class="p-4"><span class="bg-white/10 px-2 py-1 rounded text-xs">${cleanKelas}</span></td>
                        <td class="p-4 text-emerald-400"><i class="fab fa-whatsapp"></i> ${cleanWa}</td>
                        <td class="p-4 text-center">
                            <button onclick="openCardModal('${cleanNisn}', '${cleanNama}', '${cleanKelas}')" class="bg-blue-600/20 text-blue-400 hover:bg-blue-600 hover:text-white px-3 py-1.5 rounded-lg text-[11px] font-bold transition-all">
                                <i class="fas fa-qrcode mr-1"></i> Lihat Kartu
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        function handleManualAbsen(e) {
            e.preventDefault();
            showLoading(true);

            const payload = {
                action: "absenManual",
                nisn: document.getElementById('mNisn').value.trim(),
                tipe: document.getElementById('mTipe').value,
                status: document.getElementById('mStatus').value
            };

            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                alert(res.message);
                if(res.success) {
                    document.getElementById('formManual').reset();
                    syncDataFromCloud();
                }
            })
            .catch(err => alert("Gagal simpan absen manual."))
            .finally(() => showLoading(false));
        }

        // PERBAIKAN: Fungsi render tabel laporan agar fleksibel menyaring tanggal & properti kapital/kecil
        function renderTableAbsen() {
            const tbody = document.getElementById('tableAbsenBody');
            tbody.innerHTML = '';

            const filterTgl = document.getElementById('fRekapTgl').value;
            const filterKelas = document.getElementById('fRekapKelas').value.toLowerCase();

            let dataFilter = cloudAbsen;
            
            if (filterTgl) {
                dataFilter = dataFilter.filter(a => {
                    const tglRaw = a.tanggal || a.TANGGAL || '';
                    const tglClean = tglRaw.includes('T') ? tglRaw.split('T')[0] : tglRaw.substring(0, 10);
                    return tglClean === filterTgl;
                });
            }
            
            if (filterKelas) {
                dataFilter = dataFilter.filter(a => {
                    const kls = (a.kelas || a.KELAS || '').toLowerCase();
                    return kls.includes(filterKelas);
                });
            }

            if(dataFilter.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-bMuted">Tidak ada riwayat absensi pada parameter ini.</td></tr>`;
                return;
            }

            dataFilter.forEach(a => {
                const status = a.status || a.STATUS || '-';
                let statusColor = 'text-amber-400';
                if(status.toLowerCase() === 'hadir' || status.toLowerCase() === 'terlambat') statusColor = 'text-green-400';
                if(status.toLowerCase() === 'alpa') statusColor = 'text-red-400';

                const tglRaw = a.tanggal || a.TANGGAL || '-';
                const tglDisplay = tglRaw.includes('T') ? tglRaw.split('T')[0] : tglRaw.substring(0, 10);

                tbody.innerHTML += `
                    <tr class="hover:bg-white/5 transition-colors border-b border-white/5">
                        <td class="p-4">${tglDisplay}</td>
                        <td class="p-4 font-mono">${a.nisn || a.NISN || '-'}</td>
                        <td class="p-4 font-semibold text-white">${a.nama || a.NAMA || a.nama_siswa || '-'}</td>
                        <td class="p-4">${a.kelas || a.KELAS || '-'}</td>
                        <td class="p-4">${a.masuk || a.MASUK || '-'}</td>
                        <td class="p-4 ${statusColor} font-medium">${status}</td>
                        <td class="p-4 text-blue-400">${a.pulang || a.PULANG || '-'}</td>
                    </tr>
                `;
            });
        }

        function handleConfigJam(e) {
            e.preventDefault();
            showLoading(true);

            const payload = {
                action: "saveSettings",
                jamMasuk: document.getElementById('cMasuk').value,
                jamPulang: document.getElementById('cPulang').value
            };

            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                alert(res.message);
                if(res.success) syncDataFromCloud();
            })
            .catch(err => alert("Gagal memperbarui jam operasional."))
            .finally(() => showLoading(false));
        }

        function prosesUploadCsv() {
            const fileInput = document.getElementById('csvFile');
            if (fileInput.files.length === 0) { alert("Pilih file CSV terlebih dahulu!"); return; }

            const file = fileInput.files[0];
            const reader = new FileReader();
            showLoading(true);

            reader.onload = function(e) {
                const text = e.target.result;
                const baris = text.split("\n");
                
                let suksesCount = 0;
                let janjiProses = [];

                for (let i = 1; i < baris.length; i++) {
                    if (baris[i].trim() === "") continue;
                    
                    const kolom = baris[i].split(",");
                    if (kolom.length < 4) continue;

                    const payload = {
                        action: "tambahSiswa",
                        nisn: kolom[0].trim(),
                        nama: kolom[1].trim(),
                        kelas: kolom[2].trim(),
                        whatsapp: kolom[3].trim()
                    };

                    let request = fetch(API_URL, { method: "POST", body: JSON.stringify(payload) })
                    .then(res => res.json())
                    .then(res => { if(res.success) suksesCount++; });

                    janjiProses.push(request);
                }

                Promise.all(janjiProses).then(() => {
                    showLoading(false);
                    alert(`Proses selesai! ${suksesCount} data siswa berhasil diimport secara massal ke Cloud.`);
                    closeUploadModal();
                    syncDataFromCloud();
                }).catch(err => {
                    showLoading(false);
                    alert("Terjadi masalah parsial saat mengunggah database massal.");
                });
            };
            reader.readAsText(file);
        }

        // PERBAIKAN: Menstabilkan fungsi restart scanner kamera agar sinkronisasi cloud berjalan lancar
        function startQRScanner() {
            const resultDiv = document.getElementById('scan-result');
            if (resultDiv) resultDiv.classList.add('hidden');

            if (html5QrcodeScanner === null) {
                html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", { fps: 15, qrbox: 250 });
            }
            
            html5QrcodeScanner.render((decodedText) => {
                showLoading(true);
                // Matikan scanner sementara agar tidak terjadi double-trigger data kembar
                stopQRScanner();

                const payload = { action: "scanQR", nisn: decodedText.trim() };

                fetch(API_URL, { method: "POST", body: JSON.stringify(payload) })
                .then(res => res.json())
                .then(res => {
                    resultDiv.classList.remove('hidden', 'bg-red-500/20', 'text-red-400', 'bg-green-500/20', 'text-green-400');
                    if(res.success) {
                        resultDiv.classList.add('bg-green-500/20', 'text-green-400');
                    } else {
                        resultDiv.classList.add('bg-red-500/20', 'text-red-400');
                    }
                    
                    resultDiv.innerText = res.message;
                    
                    // Ambil ulang data terbaru dari Cloud agar Dashboard & Laporan langsung ter-update
                    syncDataFromCloud();
                })
                .catch(err => {
                    resultDiv.className = "text-sm font-semibold p-2 rounded bg-red-500/20 text-red-400";
                    resultDiv.innerText = "Koneksi terputus saat memproses QR.";
                })
                .finally(() => {
                    showLoading(false);
                    // Jalankan kembali scanner otomatis setelah delay 3 detik
                    setTimeout(startQRScanner, 3000);
                });
            }, (error) => {});
        }

        function stopQRScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear().then(() => {
                    html5QrcodeScanner = null;
                }).catch(err => {
                    console.log("Scanner clear log:", err);
                    html5QrcodeScanner = null;
                });
            }
        }

        function downloadLaporanPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            const filterTgl = document.getElementById('fRekapTgl').value || 'Semua';
            const filterKelas = document.getElementById('fRekapKelas').value || 'Semua';

            doc.setFont("Helvetica", "bold");
            doc.text("LAPORAN REKAPITULASI ABSENSI SISWA", 14, 15);
            doc.setFontSize(10);
            doc.setFont("Helvetica", "normal");
            doc.text(`Tanggal Laporan: ${filterTgl} | Filter Kelas: ${filterKelas}`, 14, 22);

            let dataFilter = cloudAbsen;
            if (filterTgl !== 'Semua') {
                dataFilter = dataFilter.filter(a => {
                    const tglRaw = a.tanggal || a.TANGGAL || '';
                    const tglClean = tglRaw.includes('T') ? tglRaw.split('T')[0] : tglRaw.substring(0, 10);
                    return tglClean === filterTgl;
                });
            }
            if (filterKelas !== 'Semua') {
                dataFilter = dataFilter.filter(a => {
                    const kls = (a.kelas || a.KELAS || '').toLowerCase();
                    return kls.includes(filterKelas.toLowerCase());
                });
            }

            const tableRows = [];
            dataFilter.forEach(a => {
                const tglRaw = a.tanggal || a.TANGGAL || '-';
                const tglClean = tglRaw.includes('T') ? tglRaw.split('T')[0] : tglRaw.substring(0, 10);
                tableRows.push([
                    tglClean, 
                    a.nisn || a.NISN || '-', 
                    a.nama || a.NAMA || a.nama_siswa || '-', 
                    a.kelas || a.KELAS || '-', 
                    a.masuk || a.MASUK || '-', 
                    a.status || a.STATUS || '-', 
                    a.pulang || a.PULANG || '-'
                ]);
            });

            doc.autoTable({
                head: [['Tanggal', 'NISN', 'Nama Lengkap', 'Kelas', 'Jam Masuk', 'Status', 'Jam Pulang']],
                body: tableRows,
                startY: 28,
                styles: { fontSize: 9 },
                headStyles: { fillColor: [37, 99, 235] }
            });

            doc.save(`Laporan_Absen_${filterTgl}.pdf`);
        }
    </script>
