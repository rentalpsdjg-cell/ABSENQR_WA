<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Scanner Absensi Sekolah QR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl text-center">
        <div class="inline-flex p-3 bg-indigo-600/10 rounded-full text-indigo-400 mb-4 animate-pulse">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h.01M16 20h2a2 2 0 002-2v-2a2 2 0 00-2-2h-2m-4-4h.01M9 16H5a2 2 0 00-2 2v2a2 2 0 002 2h2m4-12H9a2 2 0 00-2 2v2a2 2 0 002 2h2m0-8V4a2 2 0 00-2-2H7a2 2 0 00-2 2v2m4 4h.01" />
            </svg>
        </div>
        
        <h2 class="text-xl font-bold text-slate-100 tracking-wide">SCANNER ABSENSI QR</h2>
        <p class="text-sm text-slate-400 mb-6">Arahkan QR Code Kartu Siswa ke Scanner Device</p>

        <div class="mb-4">
            <input type="text" id="nisnInput" placeholder="Scan / Ketik NISN..." autofocus
                   class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-center text-xl font-bold tracking-widest text-indigo-300 focus:outline-none focus:border-indigo-500 transition-colors">
        </div>

        <button onclick="prosesAbsensi()" id="btnSubmit"
                class="w-full bg-indigo-600 hover:bg-indigo-500 active:scale-[0.99] font-semibold py-3 rounded-xl transition-all cursor-pointer">
            Kirim Data Absen
        </button>
    </div>

    <p class="text-xs text-slate-600 mt-6 tracking-wide">Absensi Core System v2.0 &copy; 2026</p>

    <script>
        // Masukkan URL Google Web App Anda yang Valid
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx1yBhi_o9C9R2gE01vjD1ntlvO9MHCTXXeiK303wCDNt2fzzwWQsyydz70M0x1Rn1R/exec";

        async function prosesAbsensi() {
            const inputField = document.getElementById("nisnInput");
            const btn = document.getElementById("btnSubmit");
            const nisn = inputField.value.trim();

            if (!nisn) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Kolom Kosong',
                    text: 'Silakan masukkan atau scan NISN terlebih dahulu.',
                    background: '#0f172a',
                    color: '#fff',
                    confirmButtonColor: '#4f46e5'
                });
                return;
            }

            // Kunci UI Selama Loading
            btn.disabled = true;
            btn.innerText = "Memverifikasi...";
            btn.classList.add("opacity-50");

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: "scanQR", nisn: nisn })
                });

                const result = await response.json();

                // ==========================================
                // VALIDATOR KONDISI UTAMA: SUKSES VS GAGAL
                // ==========================================
                if (result.success === true) {
                    // JIKA DATA SUKSES (HIJAU)
                    Swal.fire({
                        icon: 'success',
                        title: 'Absensi Sukses!',
                        html: `<div class="text-left text-sm space-y-2 bg-slate-950 p-4 rounded-xl border border-slate-800 mt-2 text-slate-300">` +
                              `<p>📌 Pesan: <b class="text-emerald-400">${result.message}</b></p>` +
                              `<p>👤 Nama: <b>${result.data.nama}</b></p>` +
                              `<p>🏫 Kelas: <b>${result.data.kelas}</b></p>` +
                              `<p>🕒 Log: <b>${result.data.jam} (${result.data.tipe})</b></p>` +
                              `</div><p class="text-xs text-emerald-500/80 mt-3">💬 WhatsApp Notifikasi terkirim ke Orang Tua.</p>`,
                        background: '#0f172a',
                        color: '#fff',
                        confirmButtonColor: '#10b981'
                    });
                    inputField.value = ""; // Bersihkan input untuk scan selanjutnya
                } else {
                    // JIKA DATA GAGAL ATAU DOUBLE SCAN (MERAH)
                    Swal.fire({
                        icon: 'error',
                        title: 'Gagal Absen',
                        text: result.message,
                        background: '#0f172a',
                        color: '#fff',
                        confirmButtonColor: '#ef4444'
                    });
                }
            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'Network Error',
                    text: 'Tidak dapat terhubung ke server Google Sheets.',
                    background: '#0f172a',
                    color: '#fff',
                });
            } finally {
                // Buka Kunci UI Kembali
                btn.disabled = false;
                btn.innerText = "Kirim Data Absen";
                btn.classList.remove("opacity-50");
                inputField.focus();
            }
        }

        // Listener Trigger Tekan Enter Otomatis (Saat Memakai Alat Scanner Hardware)
        document.getElementById("nisnInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                prosesAbsensi();
            }
        });
    </script>
</body>
</html>
