<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Peserta - HomeEd Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
  </style>
</head>
<body class="p-4 md:p-12">

  <div class="max-w-7xl mx-auto">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
      <div>
        <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Data Peserta</h1>
        <p class="text-sm text-slate-500 mt-1">Kelola data partisipan dan sinkronisasi otomatis ke Google Sheets via GitHub Pages</p>
      </div>
      <div class="flex gap-3 w-full sm:w-auto">
        <button class="w-1/2 sm:w-auto bg-amber-500 hover:bg-amber-600 text-white font-medium px-5 py-2.5 rounded-xl shadow-sm transition flex items-center justify-center gap-2 text-sm cursor-pointer">
          📥 ZIP QR
        </button>
        <button onclick="bukaModal()" class="w-1/2 sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2.5 rounded-xl shadow-md transition flex items-center justify-center gap-2 text-sm cursor-pointer">
          ➕ Tambah
        </button>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow-xs border border-slate-100 overflow-hidden p-6">
      
      <div class="mb-6 max-w-md relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">🔍</span>
        <input type="text" id="inputCari" oninput="cariData()" placeholder="Cari Nama atau ID..." 
               class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm transition">
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b border-slate-100 text-xs font-bold text-slate-400 tracking-wider uppercase">
              <th class="pb-4 pt-2 px-4">ID Peserta</th>
              <th class="pb-4 pt-2 px-4">Nama Lengkap</th>
              <th class="pb-4 pt-2 px-4">Kategori</th>
              <th class="pb-4 pt-2 px-4">WhatsApp</th>
              <th class="pb-4 pt-2 px-4 text-center">Aksi</th>
            </tr>
          </thead>
          <tbody id="tabelBody" class="text-sm text-slate-600 divide-y divide-slate-50">
            <tr>
              <td colspan="5" class="text-center py-12 text-slate-400 animate-pulse">Menghubungkan ke API Google Sheets...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="modalTambah" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-3xl max-w-md w-full shadow-xl p-6 border border-slate-100">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-lg font-bold text-slate-800">Tambah Partisipan Baru</h3>
        <button onclick="tutupModal()" class="text-slate-400 hover:text-slate-600 font-bold text-xl cursor-pointer">&times;</button>
      </div>
      
      <form id="formPeserta" onsubmit="simpanData(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">ID Peserta</label>
          <input type="text" id="id_peserta" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Nama Lengkap</label>
          <input type="text" id="nama_peserta" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Kategori</label>
          <input type="text" id="kategori" placeholder="Siswa, Mahasiswa, VIP" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">No WhatsApp</label>
          <input type="number" id="no_whatsapp" placeholder="628123456xxx" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500">
        </div>
        
        <div class="flex justify-end gap-3 pt-4">
          <button type="button" onclick="tutupModal()" class="px-4 py-2 text-slate-500 hover:bg-slate-50 rounded-xl text-sm font-medium transition cursor-pointer">Batal</button>
          <button type="submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-semibold shadow-md transition cursor-pointer">Simpan Data</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // URL API Google Apps Script milik Anda yang sudah digabungkan secara otomatis
    const API_URL = "https://script.google.com/macros/s/AKfycbxnHz6upXGNTRNBomPKBhY7TZPRBwrbQWT1LO_CGpoGOrM-waLJLlD8bMXIeCB641vVgQ/exec";
    
    let semuaPeserta = [];

    // Mengambil data otomatis saat halaman GitHub Pages dibuka
    window.onload = function() {
      muatDataPeserta();
    };

    function muatDataPeserta() {
      const tbody = document.getElementById('tabelBody');
      
      fetch(`${API_URL}?action=getPeserta`, { method: 'POST' })
        .then(res => res.json())
        .then(res => {
          if (res.status === 'success') {
            semuaPeserta = res.data;
            renderTabel(semuaPeserta);
          } else {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-red-500">Gagal mengambil data dari Google Sheets.</td></tr>`;
          }
        })
        .catch(err => {
          tbody.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-red-500">Gagal terhubung ke API. Pastikan skrip Apps Script di-deploy ulang sebagai 'New Version'.</td></tr>`;
        });
    }

    function renderTabel(data) {
      const tbody = document.getElementById('tabelBody');
      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-slate-400">Data tidak ditemukan. Silakan tambahkan partisipan baru.</td></tr>`;
        return;
      }

      tbody.innerHTML = data.map(p => `
        <tr class="hover:bg-slate-50/80 transition">
          <td class="py-4 px-4 font-semibold text-slate-700">${p.id}</td>
          <td class="py-4 px-4 font-medium text-slate-800">${p.nama}</td>
          <td class="py-4 px-4"><span class="px-2.5 py-1 bg-slate-100 text-slate-600 rounded-lg text-xs font-medium">${p.kategori || '-'}</span></td>
          <td class="py-4 px-4 text-slate-500">${p.wa || '-'}</td>
          <td class="py-4 px-4 text-center">
            <button onclick="hapusPeserta('${p.id}')" class="text-xs bg-red-50 text-red-600 hover:bg-red-100 px-3 py-1.5 rounded-lg font-semibold transition cursor-pointer">
              🗑️ Hapus
            </button>
          </td>
        </tr>
      `).join('');
    }

    // Fungsi Tambah Peserta Baru
    function simpanData(event) {
      event.preventDefault();
      
      const payload = {
        action: 'addPeserta',
        id: document.getElementById('id_peserta').value,
        nama: document.getElementById('nama_peserta').value,
        kategori: document.getElementById('kategori').value,
        wa: document.getElementById('no_whatsapp').value
      };

      document.getElementById('tabelBody').innerHTML = `<tr><td colspan="5" class="text-center py-12 text-slate-400">Sedang mendaftarkan ke database...</td></tr>`;
      tutupModal();

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(res => {
        alert(res.message);
        muatDataPeserta(); // Memuat ulang tabel secara instan
        document.getElementById('formPeserta').reset();
      })
      .catch(err => {
        alert('Gagal mengirim perintah! Pastikan deployment Apps Script Anda sudah benar.');
        muatDataPeserta();
      });
    }

    // Fungsi Penghapusan Peserta
    function hapusPeserta(id) {
      if (confirm(`Apakah Anda yakin ingin menghapus peserta dengan ID: ${id}?`)) {
        document.getElementById('tabelBody').innerHTML = `<tr><td colspan="5" class="text-center py-12 text-slate-400">Menghapus data di Google Sheets...</td></tr>`;
        
        fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'deletePeserta', id: id })
        })
        .then(res => res.json())
        .then(res => {
          alert(res.message);
          muatDataPeserta();
        });
      }
    }

    // Fitur pencarian instan di sisi klien
    function cariData() {
      const keyword = document.getElementById('inputCari').value.toLowerCase();
      const hasilFilter = semuaPeserta.filter(p => 
        p.nama.toLowerCase().includes(keyword) || 
        p.id.toLowerCase().includes(keyword)
      );
      renderTabel(hasilFilter);
    }

    // Modal UI Handlers
    function bukaModal() { document.getElementById('modalTambah').classList.remove('hidden'); }
    function tutupModal() { document.getElementById('modalTambah').classList.add('hidden'); }
  </script>
</body>
</html>
