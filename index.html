<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi QR Code v2.5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .scanner-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .scanner-header { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 20px; text-align: center; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; border: none !important; border-radius: 10px; overflow: hidden; }
        #reader__dashboard { padding: 15px !important; background: #fff; }
        #reader__camera_selection, button { margin: 5px; }
        .status-box { min-height: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; border-radius: 10px; transition: all 0.3s ease; }
        .mode-selector { background: #fff; padding: 10px; border-radius: 30px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
        .btn-check:checked + .btn-outline-primary { background-color: #0d6efd; color: white; }
        .btn-check:checked + .btn-outline-success { background-color: #198754; color: white; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <div class="card scanner-card">
                <div class="scanner-header">
                    <h3 class="mb-1"><i class="fa-solid fa-qrcode"></i> ABSENSI QR CODE</h3>
                    <p class="mb-0 text-white-50">Silakan arahkan kode QR Anda ke kamera</p>
                </div>
                
                <div class="card-body p-4">
                    
                    <div class="text-center mb-4 mode-selector d-flex justify-content-around">
                        <input type="radio" class="btn-check" name="modeAbsen" id="modeSiswa" checked onchange="gantiLabelMode()">
                        <label class="btn btn-outline-primary w-50 rounded-pill me-1 py-2" for="modeSiswa">
                            <i class="fa-solid fa-user-graduate"></i> SCAN SISWA
                        </label>

                        <input type="radio" class="btn-check" name="modeAbsen" id="modeGuru" onchange="gantiLabelMode()">
                        <label class="btn btn-outline-success w-50 rounded-pill ms-1 py-2" for="modeGuru">
                            <i class="fa-solid fa-user-tie"></i> SCAN GURU
                        </label>
                    </div>

                    <div class="text-center bg-light p-2 rounded mb-4" style="position: relative;">
                        <div id="reader"></div>
                        <div id="loading-spinner" class="spinner-border text-primary d-none" style="position: absolute; top: 45%; left: 45%; z-index: 10;" role="status"></div>
                    </div>

                    <div id="statusBox" class="status-box bg-secondary text-white text-center p-3">
                        <i class="fa-solid fa-camera me-2"></i> Kamera siap. Menunggu kartu di-scan...
                    </div>

                </div>
                <div class="card-footer text-center bg-white text-muted py-3">
                    E-Absensi Terintegrasi WhatsApp Gateway Fonnte &copy; 2026
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
    // Tautan Web App Google Apps Script Anda
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyYRaOqF4hfDC-pi75-FqZZveB2yGaU7a0UHKpEsHuQvgVGVXWaAzJhr4UMSzORfqz4/exec";

    let html5QrcodeScanner;
    let isProcessing = false;

    // Mengubah informasi petunjuk teks saat tombol mode ditekan
    function gantiLabelMode() {
        const isGuru = document.getElementById("modeGuru").checked;
        const statusBox = document.getElementById("statusBox");
        
        statusBox.className = "status-box bg-secondary text-white text-center p-3";
        if (isGuru) {
            statusBox.innerHTML = '<i class="fa-solid fa-camera me-2"></i> Mode Guru Aktif. Silakan scan QR NIP Guru.';
        } else {
            statusBox.innerHTML = '<i class="fa-solid fa-camera me-2"></i> Mode Siswa Aktif. Silakan scan QR NISN Siswa.';
        }
    }

    // Fungsi yang otomatis berjalan begitu kamera mendeteksi kode QR
    function onScanSuccess(decodedText, decodedResult) {
        if (isProcessing) return;
        isProcessing = true;

        const isGuru = document.getElementById("modeGuru").checked;
        const statusBox = document.getElementById("statusBox");
        const spinner = document.getElementById("loading-spinner");

        // Menampilkan animasi loading memproses data
        spinner.classList.remove("d-none");
        statusBox.className = "status-box bg-warning text-dark text-center p-3";
        statusBox.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i> Mengirim data ke server, mohon tunggu...';

        // Menyesuaikan parameter kiriman data (Payload) dengan fungsi doPost di Code.gs Anda
        let payload = {};
        if (isGuru) {
            payload = { action: "scanQRGuru", nip: decodedText };
        } else {
            payload = { action: "scanQR", nisn: decodedText };
        }

        // PROSES KIRIM DATA (FETCH) DIOPTIMALKAN UNTUK GOOGLE APPS SCRIPT
        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "cors", 
            redirect: "follow", // Mengikuti pemindahan halaman otomatis sistem Google Apps Script
            headers: {
                "Content-Type": "text/plain;charset=utf-8" // Format teks aman agar dibaca JSON.parse() tanpa ganjalan CORS
            },
            body: JSON.stringify(payload)
        })
        .then(res => {
            if (!res.ok) {
                throw new Error("Koneksi server bermasalah.");
            }
            return res.json();
        })
        .then(data => {
            spinner.classList.add("d-none");
            
            if (data.success) {
                // Berhasil Tercatat & Otomatis Terkirim ke WhatsApp Fonnte via Code.gs
                statusBox.className = "status-box bg-success text-white text-center p-3";
                statusBox.innerHTML = `<i class="fa-solid fa-circle-check me-2"></i> ${data.message}`;
                playAudio("https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav"); // Nada Beep Sukses
            } else {
                // Gagal (Siswa/Guru tidak terdaftar, atau sudah absen)
                statusBox.className = "status-box bg-danger text-white text-center p-3";
                statusBox.innerHTML = `<i class="fa-solid fa-circle-xmark me-2"></i> ${data.message}`;
                playAudio("https://assets.mixkit.co/active_storage/sfx/951/951-84.wav"); // Nada Gagal
            }

            // Jeda waktu tunggu 4 detik agar kamera tidak langsung memindai ulang kartu yang sama secara beruntun
            setTimeout(() => {
                isProcessing = false;
                gantiLabelMode();
            }, 4000);
        })
        .catch(error => {
            console.error("Detail Error:", error);
            spinner.classList.add("d-none");
            statusBox.className = "status-box bg-danger text-white text-center p-3";
            statusBox.innerHTML = `<i class="fa-solid fa-triangle-exclamation me-2"></i> Hubungan Gagal. Pastikan setelan Akses Web App adalah 'Anyone'.`;
            
            setTimeout(() => {
                isProcessing = false;
                gantiLabelMode();
            }, 5000);
        });
    }

    function playAudio(url) {
        const audio = new Audio(url);
        audio.play().catch(e => console.log("Pemutaran suara dihambat browser"));
    }

    function jalankanScanner() {
        html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 15, qrbox: 250 }, false
        );
        html5QrcodeScanner.render(onScanSuccess);
    }

    window.onload = jalankanScanner;
</script>
</body>
</html>
