<script>
    let activeScanner = null, mainChart = null, currentTab = 'harian', currentTabGuru = 'harian', cacheAbsensi = [], cacheSiswa = [], cacheGuru = [], currentModalType = '';
    let dataSiswaTerfilterGlobal = [], dataGuruTerfilterGlobal = []; 

    window.addEventListener('DOMContentLoaded', () => {
      // Set default tanggal hari ini ke input filter
      const hariIni = new Date().toISOString().split('T')[0];
      document.getElementById('filterTanggal').value = hariIni;
      document.getElementById('filterTanggalGuru').value = hariIni;
      
      const bulanIni = hariIni.substring(0, 7);
      document.getElementById('filterBulan').value = bulanIni;
      document.getElementById('filterBulanGuru').value = bulanIni;

      muatSemuaData();
      mulaiJamSistem();
    });

    function mulaiJamSistem() {
      setInterval(() => {
        const sekarang = new Date();
        document.getElementById('clockDisplay').innerText = sekarang.toLocaleDateString('id-ID', {
          weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
        }) + " | " + sekarang.toLocaleTimeString('id-ID') + " WIB";
      }, 1000);
    }

    function toggleSidebar() {
      document.getElementById('sidebarMenu').classList.toggle('-translate-x-full');
      document.getElementById('sidebarOverlay').classList.toggle('hidden');
    }

    function switchView(viewId) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('nav-active'));
      
      document.getElementById('view-' + viewId).classList.add('active');
      const navBtn = document.getElementById('nav-' + viewId);
      if (navBtn) navBtn.classList.add('nav-active');

      const titles = {
        'dashboard': 'Dashboard Absensi', 'siswa': 'Database Siswa', 'guru': 'Database Guru',
        'rekap': 'Laporan Presensi Siswa', 'rekap-guru': 'Laporan Presensi Guru',
        'manual': 'Input Keterangan Manual', 'scan': 'Scan Absensi QR', 'jam-config': 'Set Jam Operasional'
      };
      document.getElementById('viewTitle').innerText = titles[viewId] || 'E-Absensi';
      
      if (viewId === 'scan') {
        mulaiScanner();
      } else {
        matikanScanner();
      }
      toggleSidebar();
    }

    function muatSemuaData() {
      fetch(`${API_URL}?action=getAllData`)
        .then(res => res.json())
        .then(data => {
          cacheSiswa = data.siswa || [];
          cacheGuru = data.guru || [];
          cacheAbsensi = data.absensi || [];
          
          updateDropdownFilters();
          renderDataSiswa();
          renderDataGuru();
          renderDataRekap();
          renderDataRekapGuru();
          updateDashboardStats();
        })
        .catch(err => console.error("Gagal memuat data: ", err));
    }

    function updateDropdownFilters() {
      const kSet = new Set(cacheSiswa.map(s => s.kelas));
      const selKelas = document.getElementById('filterKelasSiswa');
      selKelas.innerHTML = '<option value="SEMUA">-- Semua Kelas --</option>';
      kSet.forEach(k => selKelas.innerHTML += `<option value="${k}">${k}</option>`);

      const mSet = new Set(cacheGuru.map(g => g.mapel));
      const selMapel = document.getElementById('filterMapelGuru');
      selMapel.innerHTML = '<option value="SEMUA">-- Semua Mapel --</option>';
      mSet.forEach(m => selMapel.innerHTML += `<option value="${m}">${m}</option>`);
    }

    function renderDataSiswa() {
      const container = document.getElementById('listSiswa');
      container.innerHTML = '';
      cacheSiswa.forEach(s => {
        container.innerHTML += `
          <div class="bg-bCard p-4 rounded-xl border border-white/5 space-y-3 relative overflow-hidden group">
            <div class="flex items-start justify-between">
              <div>
                <h4 class="font-bold text-sm text-white">${s.nama}</h4>
                <p class="text-xs text-bMuted mt-0.5">NISN: ${s.nisn}</p>
              </div>
              <span class="text-[10px] bg-bActive/20 text-indigo-300 font-bold px-2.5 py-1 rounded-lg">${s.kelas}</span>
            </div>
            <div class="pt-2 border-t border-white/5 flex items-center justify-between">
              <span class="text-[10px] text-bMuted truncate max-w-[150px]"><i class="fab fa-whatsapp text-emerald-400 mr-1"></i>${s.whatsapp}</span>
              <button onclick="bukaKartuDigital('${s.nisn}', '${s.nama}', '${s.kelas}', 'Siswa')" class="text-[10px] bg-white/5 hover:bg-bActive px-3 py-1.5 rounded-lg font-semibold transition-all">Lihat QR</button>
            </div>
          </div>`;
      });
    }

    function renderDataGuru() {
      const container = document.getElementById('listGuru');
      container.innerHTML = '';
      cacheGuru.forEach(g => {
        container.innerHTML += `
          <div class="bg-bCard p-4 rounded-xl border border-white/5 space-y-3">
            <div>
              <h4 class="font-bold text-sm text-white">${g.nama}</h4>
              <p class="text-xs text-bMuted mt-0.5">NIP: ${g.nip}</p>
            </div>
            <div class="pt-2 border-t border-white/5 flex items-center justify-between">
              <span class="text-[10px] bg-cyan-500/10 text-cyan-400 font-bold px-2.5 py-1 rounded-lg">${g.mapel}</span>
              <button onclick="bukaKartuDigital('${g.nip}', '${g.nama}', '${g.mapel}', 'Guru')" class="text-[10px] bg-white/5 hover:bg-cyan-600 px-3 py-1.5 rounded-lg font-semibold transition-all">Lihat QR</button>
            </div>
          </div>`;
      });
    }

    // === LOGIKA UTAMA: SINKRONISASI ALPA OTOMATIS ===
    function setRekapTab(type) {
      currentTab = type;
      document.getElementById('btnTabHarian').className = type === 'harian' ? 'flex-1 sm:flex-none px-4 py-2 rounded-lg text-xs font-bold bg-bActive text-white' : 'flex-1 sm:flex-none px-4 py-2 rounded-lg text-xs font-bold bg-bDark text-bMuted';
      document.getElementById('btnTabBulanan').className = type === 'bulanan' ? 'flex-1 sm:flex-none px-4 py-2 rounded-lg text-xs font-bold bg-bActive text-white' : 'flex-1 sm:flex-none px-4 py-2 rounded-lg text-xs font-bold bg-bDark text-bMuted';
      document.getElementById('filterTanggalArea').style.display = type === 'harian' ? 'block' : 'none';
      document.getElementById('filterBulanArea').style.display = type === 'bulanan' ? 'block' : 'none';
      renderDataRekap();
    }

    function renderDataRekap() {
      const container = document.getElementById('rekapListContainer');
      container.innerHTML = '';
      
      const keyword = document.getElementById('searchRekapSiswa').value.toLowerCase();
      const statusFilt = document.getElementById('filterStatusSiswa').value;
      const kelasFilt = document.getElementById('filterKelasSiswa').value;
      
      const tglFilt = document.getElementById('filterTanggal').value;
      const blnFilt = document.getElementById('filterBulan').value;

      let hasilData = [];

      if (currentTab === 'harian') {
        // Gabungkan seluruh master siswa untuk pengecekan Alpa otomatis
        cacheSiswa.forEach(siswa => {
          // Cari record di data absensi berdasarkan NISN dan Tanggal terpilih
          let match = cacheAbsensi.find(a => a.id_User === siswa.nisn && a.tanggal === tglFilt);
          
          if (match) {
            hasilData.push({
              nisn: siswa.nisn,
              nama: siswa.nama,
              kelas: siswa.kelas,
              jam_Masuk: match.jam_Masuk,
              jam_Pulang: match.jam_Pulang,
              status: match.status
            });
          } else {
            // Jika tidak melakukan tap, status otomatis dikonversi sebagai Alpa
            hasilData.push({
              nisn: siswa.nisn,
              nama: siswa.nama,
              kelas: siswa.kelas,
              jam_Masuk: '-',
              jam_Pulang: '-',
              status: 'Alpa'
            });
          }
        });
      } else {
        // Tab Bulanan
        cacheAbsensi.forEach(a => {
          if (a.tipe_User === 'Siswa' && a.tanggal.substring(0, 7) === blnFilt) {
            let sObj = cacheSiswa.find(s => s.nisn === a.id_User);
            hasilData.push({
              nisn: a.id_User,
              nama: a.nama,
              kelas: sObj ? sObj.kelas : '-',
              jam_Masuk: a.jam_Masuk,
              jam_Pulang: a.jam_Pulang,
              status: a.status
            });
          }
        });
      }

      // Filter Berdasarkan Input Form Filter
      dataSiswaTerfilterGlobal = hasilData.filter(item => {
        const cocokKeyword = item.nama.toLowerCase().includes(keyword) || item.nisn.includes(keyword);
        const cocokStatus = statusFilt === 'SEMUA' || item.status === statusFilt;
        const cocokKelas = kelasFilt === 'SEMUA' || item.kelas === kelasFilt;
        return cocokKeyword && cocokStatus && cocokKelas;
      });

      if (dataSiswaTerfilterGlobal.length === 0) {
        container.innerHTML = '<div class="col-span-full text-center py-8 text-xs text-bMuted">Tidak ada data laporan presensi siswa yang cocok.</div>';
        return;
      }

      dataSiswaTerfilterGlobal.forEach(item => {
        let colorStatus = "bg-amber-500/10 text-amber-400";
        if (item.status === "Hadir") colorStatus = "bg-emerald-500/10 text-emerald-400";
        if (item.status === "Terlambat") colorStatus = "bg-rose-500/10 text-rose-400";
        if (item.status === "Alpa") colorStatus = "bg-red-500/10 text-red-500 font-bold";

        container.innerHTML += `
          <div class="bg-bCard p-4 rounded-xl border border-white/5 space-y-2">
            <div class="flex justify-between items-start">
              <div>
                <h4 class="font-bold text-xs">${item.nama}</h4>
                <p class="text-[10px] text-bMuted mt-0.5">${item.nisn} | ${item.kelas}</p>
              </div>
              <span class="text-[9px] px-2 py-0.5 rounded font-bold uppercase ${colorStatus}">${item.status}</span>
            </div>
            <div class="grid grid-cols-2 gap-2 pt-2 border-t border-white/5 text-center">
              <div class="bg-bDark/50 p-1.5 rounded"><p class="text-[8px] text-bMuted uppercase font-bold">Masuk</p><p class="text-xs font-semibold mt-0.5">${item.jam_Masuk}</p></div>
              <div class="bg-bDark/50 p-1.5 rounded"><p class="text-[8px] text-bMuted uppercase font-bold">Pulang</p><p class="text-xs font-semibold mt-0.5">${item.jam_Pulang}</p></div>
            </div>
          </div>`;
      });
    }

    // === REKAP ABSENSI GURU ===
    function setRekapTabGuru(type) {
      currentTabGuru = type;
      document.getElementById('btnTabHarianGuru').className = type === 'harian' ? 'flex-1 sm:flex-none px-4 py-2 rounded-lg text-xs font-bold bg-bActive text-white' : 'flex-1 sm:flex-none px-4 py-2 rounded-lg text-xs font-bold bg-bDark text-bMuted';
      document.getElementById('btnTabBulananGuru').className = type === 'bulanan' ? 'flex-1 sm:flex-none px-4 py-2 rounded-lg text-xs font-bold bg-bActive text-white' : 'flex-1 sm:flex-none px-4 py-2 rounded-lg text-xs font-bold bg-bDark text-bMuted';
      document.getElementById('filterTanggalAreaGuru').style.display = type === 'harian' ? 'block' : 'none';
      document.getElementById('filterBulanAreaGuru').style.display = type === 'bulanan' ? 'block' : 'none';
      renderDataRekapGuru();
    }

    function renderDataRekapGuru() {
      const container = document.getElementById('rekapGuruListContainer');
      container.innerHTML = '';
      
      const keyword = document.getElementById('searchRekapGuru').value.toLowerCase();
      const statusFilt = document.getElementById('filterStatusGuru').value;
      const mapelFilt = document.getElementById('filterMapelGuru').value;
      
      const tglFilt = document.getElementById('filterTanggalGuru').value;
      const blnFilt = document.getElementById('filterBulanGuru').value;

      let hasilData = [];

      if (currentTabGuru === 'harian') {
        cacheGuru.forEach(guru => {
          let match = cacheAbsensi.find(a => a.id_User === guru.nip && a.tanggal === tglFilt);
          if (match) {
            hasilData.push({ nip: guru.nip, nama: guru.nama, mapel: guru.mapel, jam_Masuk: match.jam_Masuk, jam_Pulang: match.jam_Pulang, status: match.status });
          } else {
            hasilData.push({ nip: guru.nip, nama: guru.nama, mapel: guru.mapel, jam_Masuk: '-', jam_Pulang: '-', status: 'Alpa' });
          }
        });
      } else {
        cacheAbsensi.forEach(a => {
          if (a.tipe_User === 'Guru' && a.tanggal.substring(0, 7) === blnFilt) {
            let gObj = cacheGuru.find(g => g.nip === a.id_User);
            hasilData.push({ nip: a.id_User, nama: a.nama, mapel: gObj ? gObj.mapel : '-', jam_Masuk: a.jam_Masuk, jam_Pulang: a.jam_Pulang, status: a.status });
          }
        });
      }

      dataGuruTerfilterGlobal = hasilData.filter(item => {
        const cocokKeyword = item.nama.toLowerCase().includes(keyword) || item.nip.includes(keyword);
        const cocokStatus = statusFilt === 'SEMUA' || item.status === statusFilt;
        const cocokMapel = mapelFilt === 'SEMUA' || item.mapel === mapelFilt;
        return cocokKeyword && cocokStatus && cocokMapel;
      });

      if (dataGuruTerfilterGlobal.length === 0) {
        container.innerHTML = '<div class="col-span-full text-center py-8 text-xs text-bMuted">Tidak ada data laporan presensi guru yang cocok.</div>';
        return;
      }

      dataGuruTerfilterGlobal.forEach(item => {
        let colorStatus = "bg-amber-500/10 text-amber-400";
        if (item.status === "Hadir") colorStatus = "bg-emerald-500/10 text-emerald-400";
        if (item.status === "Terlambat") colorStatus = "bg-rose-500/10 text-rose-400";
        if (item.status === "Alpa") colorStatus = "bg-red-500/10 text-red-500 font-bold";

        container.innerHTML += `
          <div class="bg-bCard p-4 rounded-xl border border-white/5 space-y-2">
            <div class="flex justify-between items-start">
              <div>
                <h4 class="font-bold text-xs">${item.nama}</h4>
                <p class="text-[10px] text-bMuted mt-0.5">${item.nip} | ${item.mapel}</p>
              </div>
              <span class="text-[9px] px-2 py-0.5 rounded font-bold uppercase ${colorStatus}">${item.status}</span>
            </div>
            <div class="grid grid-cols-2 gap-2 pt-2 border-t border-white/5 text-center">
              <div class="bg-bDark/50 p-1.5 rounded"><p class="text-[8px] text-bMuted uppercase font-bold">Masuk</p><p class="text-xs font-semibold mt-0.5">${item.jam_Masuk}</p></div>
              <div class="bg-bDark/50 p-1.5 rounded"><p class="text-[8px] text-bMuted uppercase font-bold">Pulang</p><p class="text-xs font-semibold mt-0.5">${item.jam_Pulang}</p></div>
            </div>
          </div>`;
      });
    }

    // === UPDATE REALTIME STATS & CHART DI DASHBOARD ===
    function updateDashboardStats() {
      const tglFilt = document.getElementById('filterTanggal').value;
      let totalSiswa = cacheSiswa.length;
      let hadir = 0, pulang = 0, sakitIzin = 0, alpa = 0;

      cacheSiswa.forEach(siswa => {
        let match = cacheAbsensi.find(a => a.id_User === siswa.nisn && a.tanggal === tglFilt);
        if (match) {
          if (match.status === "Hadir" || match.status === "Terlambat") hadir++;
          if (match.jam_Pulang !== "-" && match.jam_Pulang !== "") pulang++;
          if (match.status === "Sakit" || match.status === "Izin") sakitIzin++;
          if (match.status === "Alpa") alpa++;
        } else {
          alpa++;
        }
      });

      document.getElementById('dashSiswa').innerText = totalSiswa;
      document.getElementById('dashHadir').innerText = hadir;
      document.getElementById('dashPulang').innerText = pulang;
      document.getElementById('dashSakitIzin').innerText = (sakitIzin + alpa);

      if (mainChart) mainChart.destroy();
      const ctx = document.getElementById('chartPresensi').getContext('2d');
      mainChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Hadir', 'S/I', 'Alpa'],
          datasets: [{
            data: [hadir, sakitIzin, alpa],
            backgroundColor: ['#10B981', '#F59E0B', '#EF4444'],
            borderWidth: 0
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          cutout: '75%'
        }
      });
    }

    // === CETAK PRINT LAPORAN SEPERTI GAMBAR ===

            table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 11px; }
            th, td { border: 1px solid #aaa; padding: 8px; text-align: left; }

          </div>
          <hr style="border: 1px solid #000; margin-bottom: 20px;">
          <table>
            <thead>
              <tr>
                <th width="5%" class="center-text">NO</th>
                <th width="15%">NISN</th>
                <th width="35%">NAMA LENGKAP</th>
                <th width="15%">KELAS</th>

      dataSiswaTerfilterGlobal.forEach((item, index) => {

            <hr style="border: 0.5px solid #000; width: 100%;">
            <strong>E-Absensi Admin</strong>
          </div>

        </html>`;

      const win = window.open("", "_blank");
      win.document.write(htmlCetak);
      win.document.close();
      setTimeout(() => { win.print(); }, 500);
    }

    // === UTILITAS KODE SCANNER, MANAJEMEN OPERASIONAL LAIN ===
    function mulaiScanner() {
      if (activeScanner) return;
      activeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
      activeScanner.render((txt) => {
        matikanScanner();
        Swal.fire({ title: 'Memproses Absen...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
        
        fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ action: "scanQR", nisn: txt })
        })
        .then(res => res.json())
        .then(res => {
          Swal.close();
          if(res.success) {
            Swal.fire('Berhasil!', res.message, 'success');
          } else {
            Swal.fire('Gagal', res.message, 'error');
          }
          muatSemuaData();
          switchView('dashboard');
        })
        .catch(err => { Swal.close(); Swal.fire('Error', 'Terjadi masalah koneksi ke server.', 'error'); });
      }, (err) => {});
    }

    function matikanScanner() {
      if (activeScanner) {
        activeScanner.clear().then(() => { activeScanner = null; }).catch(e => console.error(e));
      }
    }

    function simpanConfigJam() {
      const jM = document.getElementById('cfgJamMasuk').value;
      const jP = document.getElementById('cfgJamPulang').value;
      if(!jM || !jP) return Swal.fire('Gagal', 'Lengkapi seluruh formulir!', 'warning');
      
      Swal.fire({ title: 'Menyimpan...', didOpen: () => { Swal.showLoading(); } });
      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "saveSettings", jamMasuk: jM, jamPulang: jP })
      })
      .then(res => res.json())
      .then(res => { Swal.close(); Swal.fire('Sukses', res.message, 'success'); muatSemuaData(); })
      .catch(() => { Swal.close(); Swal.fire('Error', 'Gagal memproses pengaturan.', 'error'); });
    }

    function simpanManual(e) {
      e.preventDefault();
      const kat = document.getElementById('mKategori').value;
      const idU = document.getElementById('mNisn').value;
      const st = document.getElementById('mStatus').value;
      const tp = document.getElementById('mTipe').value;

      Swal.fire({ title: 'Menyimpan...', didOpen: () => { Swal.showLoading(); } });
      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "inputManualAbsen", kategori: kat, idUser: idU, status: st, tipe: tp })
      })
      .then(res => res.json())
      .then(res => {
        Swal.close();
        if(res.success) {
          Swal.fire('Sukses', res.message, 'success');
          document.getElementById('mNisn').value = '';
          muatSemuaData();
        } else {
          Swal.fire('Gagal', res.message, 'error');
        }
      })
      .catch(() => { Swal.close(); Swal.fire('Error', 'Gagal mengirim permintaan.', 'error'); });
    }

    function triggerUploadClick() { document.getElementById('csvFileInput').click(); }

    function prosesUploadMassal(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(evt) {
        const text = evt.target.result;
        const lines = text.split('\n');
        const dataUpload = [];
        
        for(let i = 1; i < lines.length; i++) {
          if(!lines[i].trim()) continue;
          const cols = lines[i].split(',');
          if(cols.length >= 4) {
            dataUpload.push({
              nisn: cols[0].trim(),
              nama: cols[1].trim(),
              kelas: cols[2].trim(),
              whatsapp: cols[3].trim()
            });
          }
        }
        
        if (dataUpload.length === 0) return Swal.fire('Format Salah', 'Data CSV kosong atau tidak valid.', 'error');

        Swal.fire({ title: 'Mengunggah massal...', didOpen: () => { Swal.showLoading(); } });
        fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ action: "uploadMassalSiswa", data: dataUpload })
        })
        .then(res => res.json())
        .then(res => {
          Swal.close();
          Swal.fire('Sukses', res.message, 'success');
          document.getElementById('csvFileInput').value = '';
          muatSemuaData();
        })
        .catch(() => { Swal.close(); Swal.fire('Error', 'Gagal mengupload data csv.', 'error'); });
      };
      reader.readAsText(file);
    }

    function openModal(type) {
      currentModalType = type;
      const f = document.getElementById('dynamicForm');
      document.getElementById('modalHeaderTitle').innerText = type === 'siswa' ? 'Tambah Data Siswa Baru' : 'Tambah Data Guru Baru';
      
      if (type === 'siswa') {
        f.innerHTML = `
          <input type="number" id="f_nisn" placeholder="Nomor Induk / NISN" required class="w-full p-3 bg-bDark border border-white/10 rounded-xl text-sm">
          <input type="text" id="f_nama" placeholder="Nama Lengkap Siswa" required class="w-full p-3 bg-bDark border border-white/10 rounded-xl text-sm">
          <input type="text" id="f_kelas" placeholder="Kelas (Contoh: XII TPMG)" required class="w-full p-3 bg-bDark border border-white/10 rounded-xl text-sm">
          <input type="text" id="f_wa" placeholder="WhatsApp Orang Tua (628xxx)" required class="w-full p-3 bg-bDark border border-white/10 rounded-xl text-sm">
          <button type="submit" class="w-full py-3 bg-bActive rounded-xl font-bold text-xs uppercase">Simpan Siswa</button>`;
      } else {
        f.innerHTML = `
          <input type="number" id="f_nip" placeholder="Nomor Induk / NIP" required class="w-full p-3 bg-bDark border border-white/10 rounded-xl text-sm">
          <input type="text" id="f_nama" placeholder="Nama Lengkap Guru" required class="w-full p-3 bg-bDark border border-white/10 rounded-xl text-sm">
          <input type="text" id="f_mapel" placeholder="Mata Pelajaran Diampu" required class="w-full p-3 bg-bDark border border-white/10 rounded-xl text-sm">
          <button type="submit" class="w-full py-3 bg-cyan-600 rounded-xl font-bold text-xs uppercase">Simpan Guru</button>`;
      }
      document.getElementById('inputModal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('inputModal').classList.add('hidden'); }

    function handleFormSubmit(e) {
      e.preventDefault();
      let payload = {};
      
      if(currentModalType === 'siswa') {
        payload = {
          action: "addSiswa",
          nisn: document.getElementById('f_nisn').value,
          nama: document.getElementById('f_nama').value,
          kelas: document.getElementById('f_kelas').value,
          whatsapp: document.getElementById('f_wa').value
        };
      } else {
        payload = {
          action: "addGuru",
          nip: document.getElementById('f_nip').value,
          nama: document.getElementById('f_nama').value,
          mapel: document.getElementById('f_mapel').value
        };
      }

      Swal.fire({ title: 'Menyimpan...', didOpen: () => { Swal.showLoading(); } });
      fetch(API_URL, { method: "POST", body: JSON.stringify(payload) })
      .then(res => res.json())
      .then(res => { Swal.close(); closeModal(); Swal.fire('Sukses', res.message, 'success'); muatSemuaData(); })
      .catch(() => { Swal.close(); Swal.fire('Error', 'Gagal memproses pengiriman data.', 'error'); });
    }

    function bukaKartuDigital(id, nama, sub, tipe) {
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${id}`;
      document.getElementById('modalQrImg').src = qrUrl;
      document.getElementById('modalQrNama').innerText = nama;
      document.getElementById('modalQrNisn').innerText = id;
      document.getElementById('modalQrKelas').innerText = sub;
      document.getElementById('qrModal').classList.remove('hidden');
    }

    function closeQrModal() { document.getElementById('qrModal').classList.add('hidden'); }
  </script>
