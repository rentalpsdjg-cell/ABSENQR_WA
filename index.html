<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Kehadiran Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bDark: '#0B0F19', bCard: '#151D30', bActive: '#2563EB', bMuted: '#64748B'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bDark text-slate-100 font-sans antialiased min-h-screen flex flex-col md:flex-row">

    <!-- SIDEBAR NAVIGASI -->
    <aside class="w-full md:w-64 bg-bCard border-b md:border-r border-white/5 flex flex-col justify-between p-4 md:p-6 shrink-0">
        <div class="space-y-6">
            <div class="flex items-center gap-3 px-2">
                <div class="bg-bActive p-2 rounded-xl text-white"><i class="fas fa-user-check text-lg"></i></div>
                <div><h1 class="text-sm font-bold tracking-wide">E-ABSENSI</h1><p class="text-[10px] text-bMuted">Management System</p></div>
            </div>
            <nav class="space-y-1">
                <button onclick="switchView('dashboard')" id="nav-dashboard" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl text-white bg-bActive transition-all"><i class="fas fa-th-large w-5"></i> Dashboard</button>
                <button onclick="switchView('scan')" id="nav-scan" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium text-bMuted hover:text-white transition-all"><i class="fas fa-qrcode w-5"></i> Scan Kamera QR</button>
                <button onclick="switchView('rekap')" id="nav-rekap" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium text-bMuted hover:text-white transition-all"><i class="fas fa-file-invoice w-5"></i> Laporan Rekap</button>
                <button onclick="switchView('siswa')" id="nav-siswa" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium text-bMuted hover:text-white transition-all"><i class="fas fa-user-graduate w-5"></i> Master Siswa</button>
                <button onclick="switchView('manual')" id="nav-manual" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium text-bMuted hover:text-white transition-all"><i class="fas fa-edit w-5"></i> Absen Manual</button>
                <button onclick="switchView('jam-config')" id="nav-jam-config" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium text-bMuted hover:text-white transition-all"><i class="fas fa-clock w-5"></i> Atur Jam Operasional</button>
            </nav>
        </div>
    </aside>

    <!-- KONTEN UTAMA -->
    <main class="flex-1 p-4 md:p-8 space-y-6 overflow-y-auto">
        <header class="flex justify-between items-center bg-bCard/40 p-4 rounded-2xl border border-white/5">
            <h2 id="pageTitle" class="text-base md:text-xl font-bold text-white">Dashboard Absensi</h2>
        </header>

        <!-- VIEW: DASHBOARD -->
        <div id="view-dashboard" class="view-section grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-bCard p-5 rounded-2xl border border-white/5"><p class="text-xs font-medium text-bMuted">Total Siswa</p><h3 id="statSiswa" class="text-2xl font-bold mt-2 text-white">0</h3></div>
            <div class="bg-bCard p-5 rounded-2xl border border-white/5"><p class="text-xs font-medium text-bMuted">Hadir Hari Ini</p><h3 id="statHadir" class="text-2xl font-bold mt-2 text-green-400">0</h3></div>
            <div class="bg-bCard p-5 rounded-2xl border border-white/5"><p class="text-xs font-medium text-bMuted">Sakit/Izin/Alpa</p><h3 id="statAbsen" class="text-2xl font-bold mt-2 text-amber-500">0</h3></div>
            <div class="bg-bCard p-5 rounded-2xl border border-white/5"><p class="text-xs font-medium text-bMuted">Sudah Pulang</p><h3 id="statPulang" class="text-2xl font-bold mt-2 text-blue-400">0</h3></div>
        </div>

        <!-- VIEW: SCAN QR -->
        <div id="view-scan" class="view-section hidden bg-bCard p-6 rounded-2xl border border-white/5 text-center max-w-md mx-auto space-y-4">
            <p class="text-xs text-bMuted">Arahkan Kode QR Siswa ke Kamera</p>
            <div class="w-full aspect-square bg-bDark rounded-xl border border-dashed border-white/10 flex items-center justify-center">[ AREA KAMERA QR SCANNER ]</div>
        </div>

        <!-- VIEW: REKAPITULASI -->
        <div id="view-rekap" class="view-section hidden space-y-4">
            <div class="bg-bCard p-4 rounded-2xl border border-white/5 flex flex-wrap gap-3 items-end">
                <div class="space-y-1.5"><label class="text-[10px] uppercase font-bold text-bMuted">Filter Tanggal/Bulan</label><input type="month" id="fRekapTgl" class="block w-full p-2 bg-bDark border border-white/10 rounded-xl text-xs text-white"></div>
                <div class="space-y-1.5"><label class="text-[10px] uppercase font-bold text-bMuted">Filter Kelas</label><input type="text" id="fRekapKelas" placeholder="Semua Kelas" class="block w-full p-2 bg-bDark border border-white/10 rounded-xl text-xs text-white"></div>
                <button onclick="downloadLaporanPDF()" class="bg-red-600 hover:bg-red-700 font-bold px-4 py-2 rounded-xl text-xs flex items-center gap-2 transition-all"><i class="fas fa-file-pdf"></i> Cetak Laporan PDF</button>
            </div>
            <div class="bg-bCard rounded-2xl border border-white/5 overflow-x-auto"><table class="w-full text-left text-xs text-bMuted"><thead class="bg-bDark text-slate-300 uppercase font-bold text-[10px] border-b border-white/5"><tr><th class="p-4">Waktu</th><th class="p-4">NISN</th><th class="p-4">Nama</th><th class="p-4">Kelas</th><th class="p-4">Masuk</th><th class="p-4">Status</th><th class="p-4">Pulang</th></tr></thead><tbody id="tableAbsenBody" class="divide-y divide-white/5 text-slate-200"></tbody></table></div>
        </div>

        <!-- VIEW: SISWA -->
        <div id="view-siswa" class="view-section hidden space-y-4">
            <div class="flex justify-between items-center"><span class="text-xs font-bold text-bMuted uppercase">Database Siswa</span><button onclick="openModal('siswa')" class="bg-bActive text-xs font-bold px-4 py-2 rounded-xl flex items-center gap-1.5"><i class="fas fa-plus"></i> Tambah Siswa</button></div>
            <div class="bg-bCard rounded-2xl border border-white/5 overflow-x-auto"><table class="w-full text-left text-xs text-bMuted"><thead class="bg-bDark text-slate-300 uppercase font-bold text-[10px] border-b border-white/5"><tr><th class="p-4">NISN</th><th class="p-4">Nama Lengkap</th><th class="p-4">Kelas</th><th class="p-4">WhatsApp Ortu</th></tr></thead><tbody id="tableSiswaBody" class="divide-y divide-white/5 text-slate-200"></tbody></table></div>
        </div>

        <!-- VIEW: MANUAL ABSEN -->
        <div id="view-manual" class="view-section hidden max-w-xl mx-auto bg-bCard p-6 rounded-2xl border border-white/5 space-y-4">
            <form id="formManual" class="space-y-4">
                <div class="space-y-1.5"><label class="text-xs font-semibold text-bMuted">Masukkan NISN Siswa</label><input type="number" id="mNisn" required class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1.5"><label class="text-xs font-semibold text-bMuted">Tipe Sesi Absen</label><select id="mTipe" class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm"><option value="Masuk">Absen Datang (Masuk)</option><option value="Pulang">Absen Pulang</option></select></div>
                    <div class="space-y-1.5"><label class="text-xs font-semibold text-bMuted">Pilih Status Keterangan</label><select id="mStatus" class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm"><option value="Hadir">Hadir</option><option value="Sakit">Sakit</option><option value="Izin">Izin</option><option value="Alpa">Alpa</option></select></div>
                </div>
                <button type="submit" class="w-full py-3 bg-emerald-600 rounded-xl font-bold text-xs uppercase tracking-wider">Simpan Keterangan Absen</button>
            </form>
        </div>

        <!-- VIEW: ATUR JAM OPERASIONAL -->
        <div id="view-jam-config" class="view-section hidden max-w-md mx-auto bg-bCard p-6 rounded-2xl border border-white/5 space-y-4">
            <form id="formConfig" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5"><label class="text-xs font-semibold text-bMuted">Batas Toleransi Masuk</label><input type="time" id="cMasuk" required class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm text-center"></div>
                    <div class="space-y-1.5"><label class="text-xs font-semibold text-bMuted">Jam Mulai Pulang</label><input type="time" id="cPulang" required class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm text-center"></div>
                </div>
                <button type="submit" class="w-full py-3 bg-bActive rounded-xl font-bold text-xs uppercase tracking-wider">Perbarui Waktu Operasional</button>
            </form>
        </div>
    </main>

    <!-- MODAL PENDAFTARAN SISWA -->
    <div id="inputModal" class="fixed inset-0 bg-bDark/80 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
        <div class="bg-bCard w-full max-w-md rounded-2xl border border-white/5 p-6 space-y-4 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-bMuted hover:text-white"><i class="fas fa-times text-lg"></i></button>
            <h3 class="text-sm font-bold text-white uppercase tracking-wider">Tambah Data Siswa</h3>
            <form id="dynamicForm" class="space-y-3">
                <input type="number" id="fNisn" placeholder="NISN Siswa" required class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm">
                <input type="text" id="fNama" placeholder="Nama Lengkap" required class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm">
                <input type="text" id="fKelas" placeholder="Kelas (Contoh: X-RPL)" required class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm">
                <input type="number" id="fWa" placeholder="Nomor WhatsApp Ortu (628xx)" required class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm">
                <button type="submit" class="w-full py-2.5 bg-bActive rounded-xl font-bold text-xs uppercase">Simpan Data Siswa</button>
            </form>
        </div>
    </div>

    <!-- LOGIKA JAVASCRIPT APLIKASI -->
    <script>
        const API_URL = "https://script.google.com/macros/s/1WMYIE4pgtCajtlfITHxM3iworYvErPrpBVtpCCqfM7E/exec"; // Sesuaikan jika dideploy ulang

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + viewId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('text-white', 'bg-bActive');
                b.classList.add('text-bMuted');
            });
            document.getElementById('nav-' + viewId).classList.add('text-white', 'bg-bActive');
            
            const titles = { dashboard: 'Dashboard Absensi', scan: 'Pemindai Kamera QR', rekap: 'Laporan Rekapitulasi', siswa: 'Master Data Siswa', manual: 'Kelola Absen Manual', 'jam-config': 'Atur Waktu Absensi' };
            document.getElementById('pageTitle').innerText = titles[viewId] || 'Sistem Absensi';
        }

        function openModal() { document.getElementById('inputModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('inputModal').classList.add('hidden'); }

        // Tambahkan Logika Fetching Data Aplikasi Anda Disini Sesuai Kebutuhan Backend Anda
    </script>
</body>
</html>
