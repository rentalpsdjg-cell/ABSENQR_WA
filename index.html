<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>E-ABSENSI MOBILE CLOUD</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyv8WyNsM3oHBVldOo1o-TbgFKA1pxazeQ_TSCNEjrRgbbE1NrknNkbnET5al82xn9d/exec";
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
          colors: { bDark: '#0A0B1E', bCard: '#141632', bActive: '#6366F1', bMuted: '#797CA6' }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0A0B1E; -webkit-tap-highlight-color: transparent; }
    .view-section { display: none; }
    .view-section.active { display: block; }
    .nav-active { color: #6366F1 !important; transform: translateY(-4px); }
    .nav-active i { background-color: rgba(99, 102, 241, 0.15); padding: 8px 14px; border-radius: 12px; }
    #reader button { background-color: #6366F1; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 600; font-size: 13px; margin: 10px auto; border:none; display: block; }
    #reader video { border-radius: 16px !important; object-fit: cover !important; }
    .custom-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="text-white font-sans antialiased flex flex-col h-screen w-screen overflow-hidden select-none">

  <header class="h-16 shrink-0 border-b border-white/5 bg-bDark/80 backdrop-blur-md flex items-center justify-between px-5 z-40 sticky top-0">
      <div class="flex items-center gap-2.5">
          <div class="w-8 h-8 rounded-xl bg-bActive flex items-center justify-center shadow-md shadow-bActive/20">
              <i class="fas fa-bolt text-xs text-white"></i>
          </div>
          <h1 id="viewTitle" class="font-bold text-sm tracking-wide">Dashboard</h1>
      </div>
      <span class="text-[10px] text-bMuted font-semibold bg-white/5 px-2.5 py-1.5 rounded-lg" id="clockDisplay">-</span>
  </header>

  <main class="flex-1 overflow-y-auto p-5 pb-24 custom-scroll">
      
      <div id="view-dashboard" class="view-section active space-y-5">
          <div class="grid grid-cols-2 gap-3.5">
              <div class="bg-bCard p-4 rounded-2xl border border-white/5"><p class="text-[10px] font-bold text-bMuted uppercase">Siswa</p><h3 id="dashSiswa" class="text-2xl font-bold mt-1">-</h3></div>
              <div class="bg-bCard p-4 rounded-2xl border border-white/5"><p class="text-[10px] font-bold text-emerald-400 uppercase">Hadir</p><h3 id="dashHadir" class="text-2xl font-bold text-emerald-400 mt-1">-</h3></div>
              <div class="bg-bCard p-4 rounded-2xl border border-white/5"><p class="text-[10px] font-bold text-amber-400 uppercase">Izin/Sakit</p><h3 id="dashSakitIzin" class="text-2xl font-bold text-amber-400 mt-1">-</h3></div>
              <div class="bg-bCard p-4 rounded-2xl border border-white/5"><p class="text-[10px] font-bold text-red-400 uppercase">Alpa</p><h3 id="dashAlpa" class="text-2xl font-bold text-red-400 mt-1">-</h3></div>
          </div>
          <div class="bg-bCard p-5 rounded-2xl border border-white/5 flex flex-col items-center">
              <h4 class="text-[11px] font-bold uppercase text-bMuted self-start mb-4">Grafik Harian</h4>
              <div class="w-full max-w-[180px]"><canvas id="chartPresensi"></canvas></div>
          </div>
      </div>

      <div id="view-siswa" class="view-section space-y-4">
          <div class="flex justify-between items-center bg-bCard p-3 rounded-xl border border-white/5">
              <span class="text-xs text-bMuted font-medium">Database Siswa</span>
              <button onclick="openModal('siswa')" class="bg-bActive text-[11px] font-bold px-3 py-1.5 rounded-lg"><i class="fas fa-plus mr-1"></i>Siswa</button>
          </div>
          <div id="listSiswa" class="space-y-2"></div>
      </div>

      <div id="view-guru" class="view-section space-y-4">
          <div class="flex justify-between items-center bg-bCard p-3 rounded-xl border border-white/5">
              <span class="text-xs text-bMuted font-medium">Database Guru</span>
              <button onclick="openModal('guru')" class="bg-bActive text-[11px] font-bold px-3 py-1.5 rounded-lg"><i class="fas fa-plus mr-1"></i>Guru</button>
          </div>
          <div id="listGuru" class="space-y-2"></div>
      </div>

      <div id="view-barcode-gen" class="view-section space-y-4">
          <div class="bg-bCard p-5 rounded-2xl border border-white/5 space-y-4 text-center">
              <h3 class="font-bold text-sm">Cetak Kartu QR Siswa</h3>
              <input type="number" id="genNisn" class="w-full p-3.5 rounded-xl bg-bDark border border-white/10 text-sm focus:outline-none text-center" placeholder="Masukkan NISN Siswa">
              <button onclick="buatKartuQR()" class="w-full py-3 bg-bActive rounded-xl font-bold text-xs shadow-md">GENERATE BARCODE</button>
              <div id="qrResultArea" class="hidden pt-4 flex flex-col items-center justify-center space-y-3 border-t border-white/5">
                  <div class="p-3 bg-white rounded-xl inline-block"><img id="generatedQrImage" class="w-36 h-36"></div>
                  <p class="text-[10px] font-bold text-cyan-400">QR CODE NISN ASLI</p>
              </div>
          </div>
      </div>

      <div id="view-laporan" class="view-section space-y-4">
          <div class="flex justify-between items-center bg-bCard p-3 rounded-xl border border-white/5">
              <span class="text-xs text-bMuted font-medium">Log Presensi</span>
              <button onclick="unduhRekapPDF()" class="bg-red-600 text-[11px] font-bold px-3 py-1.5 rounded-lg flex items-center gap-1"><i class="fas fa-file-pdf"></i> PDF</button>
          </div>
          <div id="listLaporan" class="space-y-2"></div>
      </div>

      <div id="view-kelola" class="view-section max-w-md mx-auto bg-bCard p-5 rounded-2xl border border-white/5 space-y-4">
          <h3 class="font-bold text-sm text-center">Keterangan Manual</h3>
          <form onsubmit="simpanAbsenManual(event)" class="space-y-3">
              <input type="number" id="manualNisn" required class="w-full p-3.5 rounded-xl bg-bDark border border-white/10 text-sm focus:outline-none" placeholder="Masukkan NISN">
              <select id="manualStatus" class="w-full p-3.5 rounded-xl bg-bDark border border-white/10 text-sm focus:outline-none text-white"><option value="Sakit">Sakit</option><option value="Izin">Izin</option><option value="Alpa">Alpa</option></select>
              <button type="submit" class="w-full py-3 bg-bActive rounded-xl font-bold text-xs shadow-md">SUBMIT DATA</button>
          </form>
      </div>

      <div id="view-scan" class="view-section max-w-md mx-auto bg-bCard p-4 rounded-2xl border border-white/5 text-center space-y-3">
          <p class="text-[11px] text-bMuted">Arahkan kamera belakang HP ke kartu QR siswa</p>
          <div class="w-full rounded-xl overflow-hidden bg-bDark border border-white/10 p-1">
              <div id="reader" class="w-full"></div>
          </div>
      </div>
  </main>

  <div class="fixed bottom-0 left-0 right-0 h-16 bg-bCard/95 backdrop-blur-lg border-t border-white/5 flex items-center justify-around z-40 px-2 shadow-xl">
      <button onclick="switchView('dashboard')" id="nav-dashboard" class="nav-btn nav-active flex flex-col items-center gap-1 text-bMuted transition-all"><i class="fas fa-home text-base"></i><span class="text-[9px] font-medium">Home</span></button>
      <button onclick="switchView('siswa')" id="nav-siswa" class="nav-btn flex flex-col items-center gap-1 text-bMuted transition-all"><i class="fas fa-users text-base"></i><span class="text-[9px] font-medium">Siswa</span></button>
      <button onclick="switchView('scan')" id="nav-scan" class="nav-btn flex flex-col items-center gap-1 text-bMuted transition-all"><i class="fas fa-camera text-base"></i><span class="text-[9px] font-medium">Scan</span></button>
      <button onclick="switchView('barcode-gen')" id="nav-barcode-gen" class="nav-btn flex flex-col items-center gap-1 text-bMuted transition-all"><i class="fas fa-id-card text-base"></i><span class="text-[9px] font-medium">Kartu</span></button>
      <button onclick="switchView('laporan')" id="nav-laporan" class="nav-btn flex flex-col items-center gap-1 text-bMuted transition-all"><i class="fas fa-file-alt text-base"></i><span class="text-[9px] font-medium">Log</span></button>
      <button onclick="switchView('kelola')" id="nav-kelola" class="nav-btn flex flex-col items-center gap-1 text-bMuted transition-all"><i class="fas fa-user-edit text-base"></i><span class="text-[9px] font-medium">Manual</span></button>
  </div>

  <div id="crudModal" class="hidden fixed inset-0 bg-bDark/95 backdrop-blur-md z-50 flex items-center justify-center p-5">
      <div class="bg-bCard border border-white/10 w-full max-w-sm p-5 rounded-2xl space-y-4">
          <div class="flex justify-between items-center"><h3 id="modalTitle" class="font-bold text-sm">Form</h3><button onclick="closeModal()" class="text-bMuted"><i class="fas fa-times text-lg"></i></button></div>
          <form id="modalForm" onsubmit="handleFormSubmit(event)" class="space-y-3"></form>
      </div>
  </div>

  <script>
    let activeScanner = null, mainChart = null, currentModalType = '';

    function switchView(viewId) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('nav-active'));
      
      document.getElementById(`view-${viewId}`).classList.add('active');
      document.getElementById(`nav-${viewId}`).classList.add('nav-active');
      
      const titles = { dashboard: 'Dashboard Utama', siswa: 'Data Siswa', guru: 'Data Guru', 'barcode-gen': 'Cetak Kartu QR', laporan: 'Log Absensi', kelola: 'Input Manual', scan: 'Pemindai Kamera' };
      document.getElementById('viewTitle').innerText = titles[viewId] || 'E-Absensi';

      if (viewId === 'scan') { setTimeout(startScanner, 200); } else { stopScanner(); }
      if (viewId === 'dashboard') loadStats();
      if (viewId === 'siswa' || viewId === 'guru' || viewId === 'laporan') refreshTableData();
    }

    function loadStats() {
      fetch(`${API_URL}?action=getStats`).then(res => res.json()).then(s => {
          document.getElementById('dashSiswa').innerText = s.totalSiswa;
          document.getElementById('dashHadir').innerText = s.hadir;
          document.getElementById('dashSakitIzin').innerText = s.sakit + s.izin;
          document.getElementById('dashAlpa').innerText = s.alpa;
          renderPieChart(s.hadir, s.sakit, s.izin, s.alpa);
      });
    }

    function renderPieChart(h, s, i, a) {
      const ctx = document.getElementById('chartPresensi').getContext('2d');
      if (mainChart) mainChart.destroy();
      mainChart = new Chart(ctx, {
        type: 'doughnut',
        data: { datasets: [{ data: [h, s, i, a], backgroundColor: ['#10B981', '#F59E0B', '#3B82F6', '#EF4444'], borderWidth: 0 }] },
        options: { responsive: true, cutout: '75%' }
      });
    }

    function refreshTableData() {
      fetch(`${API_URL}?action=getAllData`).then(res => res.json()).then(db => {
          let sHtml = '';
          db.siswa.forEach(s => { sHtml += `<div class="bg-bCard p-3.5 rounded-xl border border-white/5 flex justify-between items-center"><div class="space-y-0.5"><p class="text-xs font-bold text-bActive">${s.nisn}</p><p class="text-sm font-semibold">${s.nama}</p><p class="text-[10px] text-bMuted">Kelas: ${s.kelas}</p></div><button onclick="hapusMaster('Siswa', ${s.row_index})" class="text-red-400 p-2 text-xs"><i class="far fa-trash-alt"></i></button></div>`; });
          document.getElementById('listSiswa').innerHTML = sHtml || '<p class="text-center text-xs text-bMuted py-4">Data Kosong</p>';
          
          let lHtml = '';
          db.absensi.forEach(a => { lHtml += `<div class="bg-bCard p-3.5 rounded-xl border border-white/5 flex justify-between items-center"><div><p class="text-sm font-semibold">${a.nama}</p><p class="text-[10px] text-bMuted">${a.tanggal_waktu}</p></div><span class="text-[10px] font-bold px-2.5 py-1 rounded-lg ${a.status==='Hadir'?'bg-emerald-500/10 text-emerald-400':'bg-amber-500/10 text-amber-400'}">${a.status}</span></div>`; });
          document.getElementById('listLaporan').innerHTML = lHtml || '<p class="text-center text-xs text-bMuted py-4">Belum ada Log</p>';
      });
    }

    function buatKartuQR() {
      const nisn = document.getElementById("genNisn").value;
      if(!nisn) return Swal.fire("Isi NISN", "", "warning");
      document.getElementById("generatedQrImage").src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${nisn}`;
      document.getElementById("qrResultArea").classList.remove("hidden");
    }

    function unduhRekapPDF() {
      Swal.fire({ title: 'Membuat PDF...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      fetch(`${API_URL}?action=downloadPDF`).then(res => res.json()).then(res => {
          Swal.close();
          if (res.success) { window.open(res.pdfUrl, '_blank'); }
      });
    }

    function openModal(type) {
      currentModalType = type; document.getElementById('crudModal').classList.remove('hidden');
      const form = document.getElementById('modalForm');
      form.innerHTML = `<input type="number" id="in1" required placeholder="NISN / NIP" class="w-full bg-bDark border border-white/10 p-3.5 rounded-xl text-sm"><input type="text" id="in2" required placeholder="Nama Lengkap" class="w-full bg-bDark border border-white/10 p-3.5 rounded-xl text-sm"><input type="text" id="in3" required placeholder="Kelas / Mapel" class="w-full bg-bDark border border-white/10 p-3.5 rounded-xl text-sm"><button type="submit" class="w-full py-3.5 bg-bActive rounded-xl text-xs font-bold">SIMPAN DATA</button>`;
    }
    function closeModal() { document.getElementById('crudModal').classList.add('hidden'); }

    function handleFormSubmit(e) {
      e.preventDefault(); Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });
      const payload = { action: currentModalType === 'siswa' ? 'tambahSiswa' : 'tambahGuru', nisn: document.getElementById('in1').value, nip: document.getElementById('in1').value, nama: document.getElementById('in2').value, kelas: document.getElementById('in3').value, mapel: document.getElementById('in3').value };
      fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(() => { Swal.fire('Sukses', '', 'success'); closeModal(); refreshTableData(); });
    }

    function hapusMaster(type, idx) {
      Swal.fire({ title: 'Hapus data?', showCancelButton: true }).then((r) => {
        if (r.isConfirmed) {
          fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: type==='Siswa'?'hapusSiswa':'hapusGuru', row_index: idx }) }).then(() => { Swal.fire('Terhapus', '', 'success'); refreshTableData(); });
        }
      });
    }

    function simpanAbsenManual(e) {
      e.preventDefault(); Swal.fire({ title: 'Mencatat...' });
      const payload = { action: 'absenManual', nisn: document.getElementById('manualNisn').value, status: document.getElementById('manualStatus').value };
      fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(res => res.json()).then(res => {
        if(res.success) { Swal.fire('Berhasil', '', 'success'); document.getElementById('manualNisn').value = ''; }
      });
    }

    function startScanner() {
      if (activeScanner) return;
      activeScanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 220, rememberLastUsedCamera: true });
      activeScanner.render((text) => {
        stopScanner(); Swal.fire({ title: 'Memproses Absen...', didOpen: () => Swal.showLoading() });
        fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'scanQR', nisn: text }) }).then(res => res.json()).then(res => {
          if (res.success) { Swal.fire('Berhasil!', res.message, 'success').then(() => startScanner()); } 
          else { Swal.fire('Gagal', res.message, 'error').then(() => startScanner()); }
        });
      }, () => {});
    }

    function stopScanner() { if (activeScanner) { activeScanner.clear().then(() => { activeScanner = null; }); } }
    window.onload = () => { loadStats(); document.getElementById('clockDisplay').innerText = new Date().toLocaleDateString('id-ID', {day:'numeric', month:'short'}); };
  </script>
</body>
</html>
