<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>E-ABSENSI PREMIUM V2</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    // MASUKKAN URL DEPLOY WEB APP ANDA DI SINI
    const API_URL = "https://script.google.com/macros/s/AKfycbyv8WyNsM3oHBVldOo1o-TbgFKA1pxazeQ_TSCNEjrRgbbE1NrknNkbnET5al82xn9d/exec";
    
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
          colors: { bDark: '#090A1A', bCard: '#131535', bActive: '#6366F1', bMuted: '#797CA6' }
        }
      }
    }
  </script>
  <style>
    body { background-color: #090A1A; -webkit-tap-highlight-color: transparent; }
    .view-section { display: none; }
    .view-section.active { display: block; }
    .nav-active { color: #6366F1 !important; }
    .nav-active i { background-color: rgba(99, 102, 241, 0.15); padding: 6px 12px; border-radius: 10px; }
    #reader video { border-radius: 12px !important; object-fit: cover !important; }
    .custom-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="text-white font-sans antialiased flex flex-col h-screen w-screen overflow-hidden select-none">

  <!-- APP TOP BAR -->
  <header class="h-16 shrink-0 border-b border-white/5 bg-bDark/90 backdrop-blur-md flex items-center justify-between px-5 z-40 sticky top-0">
      <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-xl bg-bActive flex items-center justify-center shadow-md shadow-bActive/20"><i class="fas fa-clock text-xs text-white"></i></div>
          <h1 id="viewTitle" class="font-bold text-sm">Dashboard</h1>
      </div>
      <span class="text-[10px] text-bMuted font-bold bg-white/5 px-2.5 py-1.5 rounded-lg" id="clockDisplay">-</span>
  </header>

  <!-- CONTENT VIEW AREA -->
  <main class="flex-1 overflow-y-auto p-4 pb-24 custom-scroll">
      
      <!-- WINDOW: DASHBOARD -->
      <div id="view-dashboard" class="view-section active space-y-4">
          <div class="grid grid-cols-2 gap-3">
              <div class="bg-bCard p-4 rounded-xl border border-white/5"><p class="text-[9px] font-bold text-bMuted uppercase">Siswa Terdaftar</p><h3 id="dashSiswa" class="text-2xl font-bold mt-1">0</h3></div>
              <div class="bg-bCard p-4 rounded-xl border border-white/5"><p class="text-[9px] font-bold text-emerald-400 uppercase">Scan Datang</p><h3 id="dashHadir" class="text-2xl font-bold text-emerald-400 mt-1">0</h3></div>
              <div class="bg-bCard p-4 rounded-xl border border-white/5"><p class="text-[9px] font-bold text-cyan-400 uppercase">Scan Pulang</p><h3 id="dashPulang" class="text-2xl font-bold text-cyan-400 mt-1">0</h3></div>
              <div class="bg-bCard p-4 rounded-xl border border-white/5"><p class="text-[9px] font-bold text-amber-400 uppercase">Sakit/Izin</p><h3 id="dashSakitIzin" class="text-2xl font-bold text-amber-400 mt-1">0</h3></div>
          </div>
          <div class="bg-bCard p-4 rounded-xl border border-white/5 flex flex-col items-center">
              <div class="w-full max-w-[140px]"><canvas id="chartPresensi"></canvas></div>
          </div>
      </div>

      <!-- WINDOW: CAMERA QR SCANNER -->
      <div id="view-scan" class="view-section max-w-md mx-auto bg-bCard p-4 rounded-xl border border-white/5 text-center space-y-3">
          <div class="w-full rounded-xl overflow-hidden bg-bDark border border-white/10 p-1"><div id="reader" class="w-full"></div></div>
      </div>

      <!-- WINDOW: ATUR OPERASIONAL JAM -->
      <div id="view-jam-config" class="view-section max-w-md mx-auto bg-bCard p-5 rounded-xl border border-white/5 space-y-4">
          <h3 class="font-bold text-sm text-center"><i class="fas fa-sliders-h mr-1 text-bActive"></i> Atur Waktu Absensi</h3>
          <div class="space-y-3">
              <div>
                  <label class="text-[11px] text-bMuted font-bold block mb-1">Batas Akhir Jam Masuk Pagi</label>
                  <input type="time" id="cfgJamMasuk" class="w-full p-3 bg-bDark border border-white/10 rounded-xl text-sm focus:outline-none text-white">
              </div>
              <div>
                  <label class="text-[11px] text-bMuted font-bold block mb-1">Jam Mulai Scan Pulang</label>
                  <input type="time" id="cfgJamPulang" class="w-full p-3 bg-bDark border border-white/10 rounded-xl text-sm focus:outline-none text-white">
              </div>
              <button onclick="simpanConfigJam()" class="w-full py-3 bg-bActive rounded-xl font-bold text-xs">SIMPAN SETTING JAM</button>
          </div>
      </div>

      <!-- WINDOW: REKAP ABSENSI (HARIAN/BULANAN) -->
      <div id="view-rekap" class="view-section space-y-4">
          <div class="bg-bCard p-4 rounded-xl border border-white/5 space-y-3">
              <div class="flex gap-2">
                  <button id="btnTabHarian" onclick="setRekapTab('harian')" class="flex-1 py-2 rounded-lg text-xs font-bold bg-bActive text-white">Rekap Harian</button>
                  <button id="btnTabBulanan" onclick="setRekapTab('bulanan')" class="flex-1 py-2 rounded-lg text-xs font-bold bg-bDark text-bMuted">Rekap Bulanan</button>
              </div>
              <div id="filterTanggalArea"><input type="date" id="filterTanggal" onchange="renderDataRekap()" class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-xs text-white"></div>
              <div id="filterBulanArea" class="hidden"><input type="month" id="filterBulan" onchange="renderDataRekap()" class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-xs text-white"></div>
          </div>
          <div id="rekapListContainer" class="space-y-2"></div>
      </div>

      <!-- WINDOW: DATA MASTER SISWA -->
      <div id="view-siswa" class="view-section space-y-4">
          <div class="flex justify-between items-center bg-bCard p-3 rounded-xl border border-white/5">
              <span class="text-xs text-bMuted font-medium">Database Siswa</span>
              <button onclick="openModalSiswa()" class="bg-bActive text-xs px-3 py-1.5 rounded-lg"><i class="fas fa-plus"></i> Tambah</button>
          </div>
          <div id="listSiswa" class="space-y-2"></div>
      </div>

      <!-- WINDOW: INPUT DATA MANUAL -->
      <div id="view-manual" class="view-section max-w-md mx-auto bg-bCard p-5 rounded-xl border border-white/5 space-y-3">
          <h3 class="font-bold text-sm text-center">Form Keterangan Manual</h3>
          <form onsubmit="simpanManual(event)" class="space-y-3">
              <input type="number" id="mNisn" placeholder="Masukkan NISN" required class="w-full p-3 bg-bDark border border-white/10 rounded-xl text-sm">
              <select id="mStatus" class="w-full p-3 bg-bDark border border-white/10 rounded-xl text-sm text-white"><option value="Sakit">Sakit</option><option value="Izin">Izin</option><option value="Alpa">Alpa</option></select>
              <select id="mTipe" class="w-full p-3 bg-bDark border border-white/10 rounded-xl text-sm text-white"><option value="Masuk">Sesi Jam Datang</option><option value="Pulang">Sesi Jam Pulang</option></select>
              <button type="submit" class="w-full py-3 bg-bActive rounded-xl text-xs font-bold shadow-md">KIRIM DATA</button>
          </form>
      </div>
  </main>

  <!-- NAVIGATION BOTTOM BAR -->
  <div class="fixed bottom-0 left-0 right-0 h-16 bg-bCard/95 backdrop-blur-md border-t border-white/5 flex items-center justify-around z-40 px-1">
      <button onclick="switchView('dashboard')" id="nav-dashboard" class="nav-btn nav-active flex flex-col items-center gap-1 text-bMuted"><i class="fas fa-home text-base"></i><span class="text-[9px] font-medium">Home</span></button>
      <button onclick="switchView('scan')" id="nav-scan" class="nav-btn flex flex-col items-center gap-1 text-bMuted"><i class="fas fa-camera text-base"></i><span class="text-[9px] font-medium">Scan QR</span></button>
      <button onclick="switchView('jam-config')" id="nav-jam-config" class="nav-btn flex flex-col items-center gap-1 text-bMuted"><i class="fas fa-clock text-base"></i><span class="text-[9px] font-medium">Jam</span></button>
      <button onclick="switchView('rekap')" id="nav-rekap" class="nav-btn flex flex-col items-center gap-1 text-bMuted"><i class="fas fa-calendar-alt text-base"></i><span class="text-[9px] font-medium">Rekap</span></button>
      <button onclick="switchView('siswa')" id="nav-siswa" class="nav-btn flex flex-col items-center gap-1 text-bMuted"><i class="fas fa-users text-base"></i><span class="text-[9px] font-medium">Siswa</span></button>
      <button onclick="switchView('manual')" id="nav-manual" class="nav-btn flex flex-col items-center gap-1 text-bMuted"><i class="fas fa-pen text-base"></i><span class="text-[9px] font-medium">Manual</span></button>
  </div>

  <!-- POPUP REGISTER SISWA -->
  <div id="crudModal" class="hidden fixed inset-0 bg-bDark/95 backdrop-blur-md z-50 flex items-center justify-center p-5">
      <div class="bg-bCard border border-white/10 w-full max-w-sm p-5 rounded-2xl space-y-4">
          <div class="flex justify-between items-center"><h3 class="font-bold text-sm">Siswa Baru</h3><button onclick="closeModal()" class="text-bMuted"><i class="fas fa-times text-lg"></i></button></div>
          <form onsubmit="handleFormSubmit(event)" class="space-y-3">
              <input type="number" id="inNisn" placeholder="NISN" required class="w-full bg-bDark border border-white/10 p-3 rounded-xl text-sm">
              <input type="text" id="inNama" placeholder="Nama Lengkap" required class="w-full bg-bDark border border-white/10 p-3 rounded-xl text-sm">
              <input type="text" id="inKelas" placeholder="Kelas" required class="w-full bg-bDark border border-white/10 p-3 rounded-xl text-sm">
              <input type="number" id="inWa" placeholder="No WA Orang Tua (628...)" required class="w-full bg-bDark border border-white/10 p-3 rounded-xl text-sm">
              <button type="submit" class="w-full py-3 bg-bActive rounded-xl text-xs font-bold">DAFTARKAN SISWA</button>
          </form>
      </div>
  </div>

  <!-- CONTROL SYSTEM JAVASCRIPT -->
  <script>
    let activeScanner = null, mainChart = null, currentTab = 'harian', cacheAbsensi = [];

    function switchView(viewId) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('nav-active'));
      document.getElementById(`view-${viewId}`).classList.add('active');
      document.getElementById(`nav-${viewId}`).classList.add('nav-active');
      
      const titles = { dashboard: 'Dashboard Absensi', scan: 'Pemindai Kamera', 'jam-config': 'Atur Jam Kerja', rekap: 'Rekap Kehadiran', siswa: 'Master Data Siswa', manual: 'Keterangan Manual' };
      document.getElementById('viewTitle').innerText = titles[viewId] || 'E-Absensi';

      if (viewId === 'scan') { setTimeout(startScanner, 200); } else { stopScanner(); }
      if (viewId === 'dashboard') loadStats();
      if (viewId === 'jam-config') fetchJamConfig();
      if (viewId === 'rekap' || viewId === 'siswa') refreshDatabase();
    }

    function fetchJamConfig() {
        fetch(`${API_URL}?action=getSettings`).then(res => res.json()).then(s => {
            document.getElementById('cfgJamMasuk').value = s.jamMasuk || "07:30";
            document.getElementById('cfgJamPulang').value = s.jamPulang || "14:00";
        }).catch(() => {});
    }

    function simpanConfigJam() {
        Swal.fire({ title: 'Menyimpan konfigurasi...', didOpen: () => Swal.showLoading() });
        const payload = { action: 'saveSettings', jamMasuk: document.getElementById('cfgJamMasuk').value, jamPulang: document.getElementById('cfgJamPulang').value };
        fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(res => res.json()).then(res => {
            if(res.success) Swal.fire('Berhasil!', res.message, 'success');
        });
    }

    function loadStats() {
      fetch(`${API_URL}?action=getStats`)
        .then(res => res.json())
        .then(s => {
            // FIXED LOGIC: Mencegah teks 'undefined' dengan fallback value || 0
            document.getElementById('dashSiswa').innerText = s.totalSiswa || 0;
            document.getElementById('dashHadir').innerText = s.hadir || 0;
            document.getElementById('dashPulang').innerText = s.pulang || 0;
            document.getElementById('dashSakitIzin').innerText = s.sakitIzin || 0;
            renderPieChart(s.hadir || 0, s.pulang || 0, s.sakitIzin || 0);
        }).catch(() => {});
    }

    function renderPieChart(h, p, si) {
      const ctx = document.getElementById('chartPresensi').getContext('2d');
      if (mainChart) mainChart.destroy();
      mainChart = new Chart(ctx, {
        type: 'doughnut',
        data: { datasets: [{ data: [h, p, si], backgroundColor: ['#10B981', '#22D3EE', '#F59E0B'], borderWidth: 0 }] },
        options: { responsive: true, cutout: '75%' }
      });
    }

    function setRekapTab(type) {
        currentTab = type;
        const btnH = document.getElementById('btnTabHarian');
        const btnB = document.getElementById('btnTabBulanan');
        const areaTgl = document.getElementById('filterTanggalArea');
        const areaBln = document.getElementById('filterBulanArea');
        
        if(type === 'harian') {
            btnH.className = "flex-1 py-2 rounded-lg text-xs font-bold bg-bActive text-white";
            btnB.className = "flex-1 py-2 rounded-lg text-xs font-bold bg-bDark text-bMuted";
            areaTgl.classList.remove('hidden'); areaBln.classList.add('hidden');
        } else {
            btnB.className = "flex-1 py-2 rounded-lg text-xs font-bold bg-bActive text-white";
            btnH.className = "flex-1 py-2 rounded-lg text-xs font-bold bg-bDark text-bMuted";
            areaBln.classList.remove('hidden'); areaTgl.classList.add('hidden');
        }
        renderDataRekap();
    }

    function refreshDatabase() {
        fetch(`${API_URL}?action=getAllData`).then(res => res.json()).then(db => {
            cacheAbsensi = db.absensi || [];
            let sHtml = '';
            if(db.siswa) {
                db.siswa.forEach(s => {
                    sHtml += `<div class="bg-bCard p-3 rounded-xl border border-white/5 flex justify-between items-center"><div><p class="text-xs font-bold text-bActive">${s.nisn}</p><p class="text-sm font-semibold">${s.nama}</p><p class="text-[10px] text-bMuted">Kelas: ${s.kelas}</p></div></div>`;
                });
            }
            document.getElementById('listSiswa').innerHTML = sHtml || '<p class="text-xs text-center text-bMuted py-4">Siswa belum diinput</p>';
            renderDataRekap();
        }).catch(() => {});
    }

    function renderDataRekap() {
        let html = '';
        const tglFilter = document.getElementById('filterTanggal').value;
        const blnFilter = document.getElementById('filterBulan').value;
        
        cacheAbsensi.forEach(a => {
            let matches = false;
            let tglRow = a.tanggal ? a.tanggal.substring(0, 10) : "";
            
            if(currentTab === 'harian' && tglFilter && tglRow === tglFilter) matches = true;
            if(currentTab === 'bulanan' && blnFilter && tglRow.substring(0, 7) === blnFilter) matches = true;
            if(!tglFilter && currentTab === 'harian') matches = true; 
            if(!blnFilter && currentTab === 'bulanan') matches = true;
            
            if(matches) {
                html += `
                <div class="bg-bCard p-3.5 rounded-xl border border-white/5 space-y-2">
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="text-sm font-bold text-white">${a.nama_siswa || a.nama || 'Siswa'}</h4>
                            <p class="text-[10px] text-bMuted">Kelas: ${a.kelas || '-'} | Tgl: ${tglRow}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 pt-1 border-t border-white/5 text-[11px]">
                        <div><p class="text-bMuted">Jam Datang</p><p class="font-semibold text-emerald-400"><i class="fas fa-sign-in-alt mr-1"></i>${a.jam_datang || '-'}</p></div>
                        <div><p class="text-bMuted">Jam Pulang</p><p class="font-semibold text-cyan-400"><i class="fas fa-sign-out-alt mr-1"></i>${a.jam_pulang || '-'}</p></div>
                    </div>
                    <div class="text-[10px] bg-bDark/50 px-2 py-1 rounded border border-white/5 flex justify-between">
                        <span class="text-bMuted">Status Masuk:</span> <span class="font-bold text-amber-400">${a.status_masuk || 'Hadir'}</span>
                    </div>
                </div>`;
            }
        });
        document.getElementById('rekapListContainer').innerHTML = html || '<p class="text-xs text-center text-bMuted py-4">Tidak ada record absensi.</p>';
    }

    function startScanner() {
      if (activeScanner) return;
      activeScanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 220, rememberLastUsedCamera: true });
      activeScanner.render((text) => {
        stopScanner(); Swal.fire({ title: 'Menyimpan Absensi...', didOpen: () => Swal.showLoading() });
        fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'scanQR', nisn: text }) }).then(res => res.json()).then(res => {
          if (res.success) {
            Swal.fire('Berhasil Terbaca!', res.message, 'success').then(() => startScanner());
          } else {
            Swal.fire('Gagal', res.message, 'error').then(() => startScanner());
          }
        });
      }, () => {});
    }

    function stopScanner() { if (activeScanner) { activeScanner.clear().then(() => { activeScanner = null; }); } }
    function openModalSiswa() { document.getElementById('crudModal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('crudModal').classList.add('hidden'); }
    
    function handleFormSubmit(e) {
      e.preventDefault(); Swal.fire({ title: 'Menyimpan Siswa...' });
      const payload = { action: 'tambahSiswa', nisn: document.getElementById('inNisn').value, nama: document.getElementById('inNama').value, kelas: document.getElementById('inKelas').value, whatsapp: document.getElementById('inWa').value };
      fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(() => { closeModal(); refreshDatabase(); Swal.fire('Sukses', 'Siswa terdaftar!', 'success'); });
    }

    function simpanManual(e) {
        e.preventDefault(); Swal.fire({ title: 'Mencatat data...' });
        const payload = { action: 'absenManual', nisn: document.getElementById('mNisn').value, status: document.getElementById('mStatus').value, tipe: document.getElementById('mTipe').value };
        fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(res => res.json()).then(res => {
            if(res.success) { Swal.fire('Sukses!', res.message, 'success'); document.getElementById('mNisn').value = ''; }
        });
    }

    window.onload = () => {
        const tgl = new Date();
        document.getElementById('filterTanggal').value = tgl.toISOString().substring(0, 10);
        document.getElementById('filterBulan').value = tgl.toISOString().substring(0, 7);
        document.getElementById('clockDisplay').innerText = tgl.toLocaleDateString('id-ID', {day:'numeric', month:'short'});
        loadStats();
    };
  </script>
</body>
</html>
