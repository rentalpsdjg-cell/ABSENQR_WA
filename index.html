<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Kehadiran Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bDark: '#0B0F19', bCard: '#151D30', bActive: '#2563EB', bMuted: '#64748B'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bDark text-slate-100 font-sans antialiased min-h-screen flex flex-col md:flex-row">

    <aside class="w-full md:w-64 bg-bCard border-b md:border-r border-white/5 flex flex-col justify-between p-4 md:p-6 shrink-0">
        <div class="space-y-6">
            <div class="flex items-center gap-3 px-2">
                <div class="bg-bActive p-2 rounded-xl text-white"><i class="fas fa-user-check text-lg"></i></div>
                <div><h1 class="text-sm font-bold tracking-wide">E-ABSENSI</h1><p class="text-[10px] text-bMuted">Management System</p></div>
            </div>
            <nav class="space-y-1">
                <button onclick="switchView('dashboard')" id="nav-dashboard" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl text-white bg-bActive transition-all"><i class="fas fa-th-large w-5"></i> Dashboard</button>
                <button onclick="switchView('scan')" id="nav-scan" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium text-bMuted hover:text-white transition-all"><i class="fas fa-qrcode w-5"></i> Scan Kamera QR</button>
                <button onclick="switchView('rekap')" id="nav-rekap" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium text-bMuted hover:text-white transition-all"><i class="fas fa-file-invoice w-5"></i> Laporan Rekap</button>
                <button onclick="switchView('siswa')" id="nav-siswa" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium text-bMuted hover:text-white transition-all"><i class="fas fa-user-graduate w-5"></i> Master Siswa</button>
                <button onclick="switchView('manual')" id="nav-manual" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium text-bMuted hover:text-white transition-all"><i class="fas fa-edit w-5"></i> Absen Manual</button>
                <button onclick="switchView('jam-config')" id="nav-jam-config" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium text-bMuted hover:text-white transition-all"><i class="fas fa-clock w-5"></i> Atur Jam Operasional</button>
            </nav>
        </div>
    </aside>

    <main class="flex-1 p-4 md:p-8 space-y-6 overflow-y-auto">
        <header class="flex justify-between items-center bg-bCard/40 p-4 rounded-2xl border border-white/5">
            <h2 id="pageTitle" class="text-base md:text-xl font-bold text-white">Dashboard Absensi</h2>
        </header>

        <div id="view-dashboard" class="view-section grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-bCard p-5 rounded-2xl border border-white/5"><p class="text-xs font-medium text-bMuted">Total Siswa</p><h3 id="statSiswa" class="text-2xl font-bold mt-2 text-white">0</h3></div>
            <div class="bg-bCard p-5 rounded-2xl border border-white/5"><p class="text-xs font-medium text-bMuted">Hadir Hari Ini</p><h3 id="statHadir" class="text-2xl font-bold mt-2 text-green-400">0</h3></div>
            <div class="bg-bCard p-5 rounded-2xl border border-white/5"><p class="text-xs font-medium text-bMuted">Sakit/Izin/Alpa</p><h3 id="statAbsen" class="text-2xl font-bold mt-2 text-amber-500">0</h3></div>
            <div class="bg-bCard p-5 rounded-2xl border border-white/5"><p class="text-xs font-medium text-bMuted">Sudah Pulang</p><h3 id="statPulang" class="text-2xl font-bold mt-2 text-blue-400">0</h3></div>
        </div>

        <div id="view-scan" class="view-section hidden bg-bCard p-6 rounded-2xl border border-white/5 text-center max-w-md mx-auto space-y-4">
            <p class="text-xs text-bMuted">Arahkan Kode QR Siswa ke Kamera (Isi QR berupa NISN)</p>
            <div id="qr-reader" class="w-full bg-bDark rounded-xl border border-dashed border-white/10 overflow-hidden"></div>
            <div id="scan-result" class="text-sm font-semibold p-2 rounded hidden"></div>
        </div>

        <div id="view-rekap" class="view-section hidden space-y-4">
            <div class="bg-bCard p-4 rounded-2xl border border-white/5 flex flex-wrap gap-3 items-end">
                <div class="space-y-1.5"><label class="text-[10px] uppercase font-bold text-bMuted">Filter Tanggal</label><input type="date" id="fRekapTgl" class="block w-full p-2 bg-bDark border border-white/10 rounded-xl text-xs text-white"></div>
                <div class="space-y-1.5"><label class="text-[10px] uppercase font-bold text-bMuted">Filter Kelas</label><input type="text" id="fRekapKelas" placeholder="Semua Kelas" class="block w-full p-2 bg-bDark border border-white/10 rounded-xl text-xs text-white"></div>
                <button onclick="downloadLaporanPDF()" class="bg-red-600 hover:bg-red-700 font-bold px-4 py-2 rounded-xl text-xs flex items-center gap-2 transition-all"><i class="fas fa-file-pdf"></i> Cetak Laporan PDF</button>
            </div>
            <div class="bg-bCard rounded-2xl border border-white/5 overflow-x-auto"><table class="w-full text-left text-xs text-bMuted"><thead class="bg-bDark text-slate-300 uppercase font-bold text-[10px] border-b border-white/5"><tr><th class="p-4">Tanggal</th><th class="p-4">NISN</th><th class="p-4">Nama</th><th class="p-4">Kelas</th><th class="p-4">Masuk</th><th class="p-4">Status</th><th class="p-4">Pulang</th></tr></thead><tbody id="tableAbsenBody" class="divide-y divide-white/5 text-slate-200"></tbody></table></div>
        </div>

        <div id="view-siswa" class="view-section hidden space-y-4">
            <div class="flex justify-between items-center"><span class="text-xs font-bold text-bMuted uppercase">Database Siswa</span><button onclick="openModal()" class="bg-bActive text-xs font-bold px-4 py-2 rounded-xl flex items-center gap-1.5"><i class="fas fa-plus"></i> Tambah Siswa</button></div>
            <div class="bg-bCard rounded-2xl border border-white/5 overflow-x-auto"><table class="w-full text-left text-xs text-bMuted"><thead class="bg-bDark text-slate-300 uppercase font-bold text-[10px] border-b border-white/5"><tr><th class="p-4">NISN</th><th class="p-4">Nama Lengkap</th><th class="p-4">Kelas</th><th class="p-4">WhatsApp Ortu</th><th class="p-4">Aksi</th></tr></thead><tbody id="tableSiswaBody" class="divide-y divide-white/5 text-slate-200"></tbody></table></div>
        </div>

        <div id="view-manual" class="view-section hidden max-w-xl mx-auto bg-bCard p-6 rounded-2xl border border-white/5 space-y-4">
            <form id="formManual" class="space-y-4" onsubmit="handleManualAbsen(event)">
                <div class="space-y-1.5"><label class="text-xs font-semibold text-bMuted">Masukkan NISN Siswa</label><input type="number" id="mNisn" required class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm text-white"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1.5"><label class="text-xs font-semibold text-bMuted">Tipe Sesi Absen</label><select id="mTipe" class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm text-white bg-bCard"><option value="Masuk">Absen Datang (Masuk)</option><option value="Pulang">Absen Pulang</option></select></div>
                    <div class="space-y-1.5"><label class="text-xs font-semibold text-bMuted">Pilih Status Keterangan</label><select id="mStatus" class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm text-white bg-bCard"><option value="Hadir">Hadir</option><option value="Sakit">Sakit</option><option value="Izin">Izin</option><option value="Alpa">Alpa</option></select></div>
                </div>
                <button type="submit" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 rounded-xl font-bold text-xs uppercase tracking-wider transition-all">Simpan Keterangan Absen</button>
            </form>
        </div>

        <div id="view-jam-config" class="view-section hidden max-w-md mx-auto bg-bCard p-6 rounded-2xl border border-white/5 space-y-4">
            <form id="formConfig" class="space-y-4" onsubmit="handleConfigJam(event)">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5"><label class="text-xs font-semibold text-bMuted">Batas Toleransi Masuk</label><input type="time" id="cMasuk" required class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm text-center text-white"></div>
                    <div class="space-y-1.5"><label class="text-xs font-semibold text-bMuted">Jam Mulai Pulang</label><input type="time" id="cPulang" required class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm text-center text-white"></div>
                </div>
                <button type="submit" class="w-full py-3 bg-bActive hover:bg-blue-700 rounded-xl font-bold text-xs uppercase tracking-wider transition-all">Perbarui Waktu Operasional</button>
            </form>
        </div>
    </main>

    <div id="inputModal" class="fixed inset-0 bg-bDark/80 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
        <div class="bg-bCard w-full max-w-md rounded-2xl border border-white/5 p-6 space-y-4 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-bMuted hover:text-white"><i class="fas fa-times text-lg"></i></button>
            <h3 class="text-sm font-bold text-white uppercase tracking-wider">Tambah Data Siswa</h3>
            <form id="dynamicForm" class="space-y-3" onsubmit="handleTambahSiswa(event)">
                <input type="number" id="fNisn" placeholder="NISN Siswa" required class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm text-white">
                <input type="text" id="fNama" placeholder="Nama Lengkap" required class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm text-white">
                <input type="text" id="fKelas" placeholder="Kelas (Contoh: X-RPL)" required class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm text-white">
                <input type="number" id="fWa" placeholder="Nomor WhatsApp Ortu (628xx)" required class="w-full p-2.5 bg-bDark border border-white/10 rounded-xl text-sm text-white">
                <button type="submit" class="w-full py-2.5 bg-bActive hover:bg-blue-700 rounded-xl font-bold text-xs uppercase transition-all">Simpan Data Siswa</button>
            </form>
        </div>
    </div>

    <script>
        // Database lokal menggunakan localStorage
        let dbSiswa = JSON.parse(localStorage.getItem('dbSiswa')) || [];
        let dbAbsen = JSON.parse(localStorage.getItem('dbAbsen')) || [];
        let configJam = JSON.parse(localStorage.getItem('configJam')) || { masuk: "07:30", pulang: "15:00" };

        let html5QrcodeScanner = null;

        // Inisialisasi awal saat dokumen selesai dimuat
        document.addEventListener("DOMContentLoaded", () => {
            // Set default value filter tanggal ke hari ini
            const hariIni = new Date().toISOString().split('T')[0];
            document.getElementById('fRekapTgl').value = hariIni;
            
            // Set default konfigurasi jam operasional di input form
            document.getElementById('cMasuk').value = configJam.masuk;
            document.getElementById('cPulang').value = configJam.pulang;

            // Pasang event listener untuk filter rekapitulasi agar otomatis ter-update saat diubah
            document.getElementById('fRekapTgl').addEventListener('change', renderTableAbsen);
            document.getElementById('fRekapKelas').addEventListener('input', renderTableAbsen);

            // Perbarui visualisasi data di dashboard
            updateDashboardStats();
            renderTableSiswa();
            renderTableAbsen();
        });

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + viewId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('text-white', 'bg-bActive');
                b.classList.add('text-bMuted');
            });
            document.getElementById('nav-' + viewId).classList.add('text-white', 'bg-bActive');
            
            const titles = { dashboard: 'Dashboard Absensi', scan: 'Pemindai Kamera QR', rekap: 'Laporan Rekapitulasi', siswa: 'Master Data Siswa', manual: 'Kelola Absen Manual', 'jam-config': 'Atur Waktu Absensi' };
            document.getElementById('pageTitle').innerText = titles[viewId] || 'Sistem Absensi';

            // Logika khusus kontrol Kamera Scanner QR
            if (viewId === 'scan') {
                startQRScanner();
            } else {
                stopQRScanner();
            }
        }

        function openModal() { document.getElementById('inputModal').classList.remove('hidden'); }
        function closeModal() { 
            document.getElementById('inputModal').classList.add('hidden'); 
            document.getElementById('dynamicForm').reset();
        }

        // ================= STRUKTUR LOGIKA CORE ABSENSI =================

        function updateDashboardStats() {
            const hariIni = new Date().toISOString().split('T')[0];
            const absenHariIni = dbAbsen.filter(a => a.tanggal === hariIni);

            const totalSiswa = dbSiswa.length;
            const hadir = absenHariIni.filter(a => a.status === 'Hadir').length;
            const nonHadir = absenHariIni.filter(a => ['Sakit', 'Izin', 'Alpa'].includes(a.status)).length;
            const pulang = absenHariIni.filter(a => a.pulang !== '-').length;

            document.getElementById('statSiswa').innerText = totalSiswa;
            document.getElementById('statHadir').innerText = hadir;
            document.getElementById('statAbsen').innerText = nonHadir;
            document.getElementById('statPulang').innerText = pulang;
        }

        function handleTambahSiswa(e) {
            e.preventDefault();
            const nisn = document.getElementById('fNisn').value.trim();
            const nama = document.getElementById('fNama').value.trim();
            const kelas = document.getElementById('fKelas').value.trim();
            const wa = document.getElementById('fWa').value.trim();

            if (dbSiswa.some(s => s.nisn === nisn)) {
                alert("Siswa dengan NISN tersebut sudah terdaftar!");
                return;
            }

            dbSiswa.push({ nisn, nama, kelas, wa });
            localStorage.setItem('dbSiswa', JSON.stringify(dbSiswa));
            
            closeModal();
            updateDashboardStats();
            renderTableSiswa();
            alert("Data siswa berhasil ditambahkan!");
        }

        function hapusSiswa(nisn) {
            if (confirm(`Apakah Anda yakin ingin menghapus siswa dengan NISN ${nisn}?`)) {
                dbSiswa = dbSiswa.filter(s => s.nisn !== nisn);
                localStorage.setItem('dbSiswa', JSON.stringify(dbSiswa));
                updateDashboardStats();
                renderTableSiswa();
            }
        }

        function renderTableSiswa() {
            const tbody = document.getElementById('tableSiswaBody');
            tbody.innerHTML = '';
            
            if(dbSiswa.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-bMuted">Belum ada data siswa.</td></tr>`;
                return;
            }

            dbSiswa.forEach(s => {
                tbody.innerHTML += `
                    <tr class="hover:bg-white/5 transition-colors">
                        <td class="p-4 font-mono font-bold text-white">${s.nisn}</td>
                        <td class="p-4">${s.nama}</td>
                        <td class="p-4"><span class="bg-white/10 px-2 py-1 rounded text-xs">${s.kelas}</span></td>
                        <td class="p-4 text-emerald-400"><i class="fab fa-whatsapp"></i> ${s.wa}</td>
                        <td class="p-4">
                            <button onclick="hapusSiswa('${s.nisn}')" class="text-red-400 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        function prosesAbsensi(nisn, tipe, statusTerpilih = 'Hadir') {
            const siswa = dbSiswa.find(s => s.nisn === nisn);
            if (!siswa) {
                return { sukses: false, pesan: `Siswa dengan NISN ${nisn} tidak ditemukan di database!` };
            }

            const sekarang = new Date();
            const tanggal = sekarang.toISOString().split('T')[0];
            const jam = sekarang.toTimeString().split(' ')[0].substring(0, 5); // Format "HH:MM"

            let dataAbsenIndex = dbAbsen.findIndex(a => a.tanggal === tanggal && a.nisn === nisn);

            if (tipe === 'Masuk') {
                if (dataAbsenIndex !== -1) {
                    return { sukses: false, pesan: `${siswa.nama} sudah melakukan absen masuk hari ini.` };
                }

                // Cek keterlambatan jika statusnya Hadir
                let statusFinal = statusTerpilih;
                if (statusTerpilih === 'Hadir' && jam > configJam.masuk) {
                    statusFinal = 'Hadir (Terlambat)';
                }

                dbAbsen.push({
                    tanggal,
                    nisn,
                    nama: siswa.nama,
                    kelas: siswa.kelas,
                    masuk: jam,
                    status: statusFinal,
                    pulang: '-'
                });
            } else if (tipe === 'Pulang') {
                if (dataAbsenIndex === -1) {
                    // Jika belum absen masuk, otomatis buat sesi masuknya kosong / Alpha
                    dbAbsen.push({
                        tanggal,
                        nisn,
                        nama: siswa.nama,
                        kelas: siswa.kelas,
                        masuk: '-',
                        status: statusTerpilih,
                        pulang: jam
                    });
                } else {
                    if (dbAbsen[dataAbsenIndex].pulang !== '-') {
                        return { sukses: false, pesan: `${siswa.nama} sudah melakukan absen pulang hari ini.` };
                    }
                    dbAbsen[dataAbsenIndex].pulang = jam;
                }
            }

            localStorage.setItem('dbAbsen', JSON.stringify(dbAbsen));
            updateDashboardStats();
            renderTableAbsen();
            return { sukses: true, pesan: `Absen ${tipe} berhasil untuk ${siswa.nama} (${statusTerpilih})` };
        }

        function handleManualAbsen(e) {
            e.preventDefault();
            const nisn = document.getElementById('mNisn').value.trim();
            const tipe = document.getElementById('mTipe').value;
            const status = document.getElementById('mStatus').value;

            const hasil = prosesAbsensi(nisn, tipe, status);
            alert(hasil.pesan);
            if(hasil.sukses) document.getElementById('formManual').reset();
        }

        function renderTableAbsen() {
            const tbody = document.getElementById('tableAbsenBody');
            tbody.innerHTML = '';

            const filterTgl = document.getElementById('fRekapTgl').value;
            const filterKelas = document.getElementById('fRekapKelas').value.toLowerCase();

            let dataFilter = dbAbsen;
            if (filterTgl) dataFilter = dataFilter.filter(a => a.tanggal === filterTgl);
            if (filterKelas) dataFilter = dataFilter.filter(a => a.kelas.toLowerCase().includes(filterKelas));

            if(dataFilter.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-bMuted">Tidak ada riwayat absensi yang cocok dengan filter.</td></tr>`;
                return;
            }

            dataFilter.forEach(a => {
                let statusColor = 'text-amber-400';
                if(a.status.includes('Hadir')) statusColor = 'text-green-400';
                if(a.status === 'Alpa') statusColor = 'text-red-400';

                tbody.innerHTML += `
                    <tr class="hover:bg-white/5 transition-colors">
                        <td class="p-4">${a.tanggal}</td>
                        <td class="p-4 font-mono">${a.nisn}</td>
                        <td class="p-4 font-semibold text-white">${a.nama}</td>
                        <td class="p-4">${a.kelas}</td>
                        <td class="p-4">${a.masuk}</td>
                        <td class="p-4 ${statusColor} font-medium">${a.status}</td>
                        <td class="p-4 text-blue-400">${a.pulang}</td>
                    </tr>
                `;
            });
        }

        function handleConfigJam(e) {
            e.preventDefault();
            configJam.masuk = document.getElementById('cMasuk').value;
            configJam.pulang = document.getElementById('cPulang').value;
            localStorage.setItem('configJam', JSON.stringify(configJam));
            alert("Jam operasional absensi berhasil diperbarui!");
        }

        // ================= INTEGRASI KAMERA QR SCANNER =================

        function startQRScanner() {
            const resultDiv = document.getElementById('scan-result');
            resultDiv.classList.add('hidden');

            html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", { fps: 10, qrbox: 250 });
            html5QrcodeScanner.render((decodedText) => {
                // Berhasil scan data text kode QR (diasumsikan isinya adalah nomor NISN)
                const hasil = prosesAbsensi(decodedText.trim(), 'Masuk', 'Hadir');
                
                resultDiv.classList.remove('hidden', 'bg-red-500/20', 'text-red-400', 'bg-green-500/20', 'text-green-400');
                if(hasil.sukses) {
                    resultDiv.classList.add('bg-green-500/20', 'text-green-400');
                } else {
                    resultDiv.classList.add('bg-red-500/20', 'text-red-400');
                }
                resultDiv.innerText = hasil.pesan;

                // Stop & start ulang scanner agar tidak membeku/spamming hasil scan yang sama
                html5QrcodeScanner.clear();
                setTimeout(startQRScanner, 2000); 

            }, (error) => {
                // Abaikan error scanning real-time biasa
            });
        }

        function stopQRScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear().catch(err => console.log(err));
                html5QrcodeScanner = null;
            }
        }

        // ================= CETAK EXPORT PDF LAPORAN =================

        function downloadLaporanPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            const filterTgl = document.getElementById('fRekapTgl').value || 'Semua';
            const filterKelas = document.getElementById('fRekapKelas').value || 'Semua';

            doc.setFont("Helvetica", "bold");
            doc.text("LAPORAN REKAPITULASI ABSENSI SISWA", 14, 15);
            doc.setFontSize(10);
            doc.setFont("Helvetica", "normal");
            doc.text(`Tanggal Laporan: ${filterTgl} | Filter Kelas: ${filterKelas}`, 14, 22);

            let dataFilter = dbAbsen;
            if (filterTgl !== 'Semua') dataFilter = dataFilter.filter(a => a.tanggal === filterTgl);
            if (filterKelas !== 'Semua') dataFilter = dataFilter.filter(a => a.kelas.toLowerCase().includes(filterKelas.toLowerCase()));

            const tableRows = [];
            dataFilter.forEach(a => {
                tableRows.push([a.tanggal, a.nisn, a.nama, a.kelas, a.masuk, a.status, a.pulang]);
            });

            doc.autoTable({
                head: [['Tanggal', 'NISN', 'Nama Lengkap', 'Kelas', 'Jam Masuk', 'Status', 'Jam Pulang']],
                body: tableRows,
                startY: 28,
                styles: { fontSize: 9 },
                headStyles: { fillColor: [37, 99, 235] } // Warna bActive biru
            });

            doc.save(`Laporan_Absen_${filterTgl}.pdf`);
        }
    </script>
</body>
</html>
